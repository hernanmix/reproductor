<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OvenPlayer Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ovenplayer/dist/ovenplayer.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
    }
    #player_id {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="player_id"></div>
<script>
  function initPlayer() {
    // Obtener parámetro ?stream=...
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream") || "telemundo";

    // Construir URL del proxy
    const sourceUrl = "https://canchatv.online/tvtvhd/proxy3.php?stream=espn" + stream;

    var p2pConfig = {
      live: true,
      swFile: './sw.js'
    };

    if (!Hls.P2pEngine.isMSESupported()) {
      new Hls.P2pEngine.ServiceWorkerEngine(p2pConfig);
    }

    Hls.P2pEngine.tryRegisterServiceWorker(p2pConfig).then(() => {
      OvenPlayer.create('player_id', {
        sources: [
          {
            label: stream,
            type: 'hls',
            file: sourceUrl
          }
        ],
        hlsConfig: {
          p2pConfig
        }
      });
    });

    // 🔹 Ajuste visual en fullscreen → llenar pantalla sin bordes negros
    document.addEventListener("fullscreenchange", () => {
      const videoEl = document.querySelector("video");
      if (document.fullscreenElement && videoEl) {
        videoEl.style.objectFit = "fill";
        videoEl.style.width = "100vw";
        videoEl.style.height = "100vh";
      } else if (videoEl) {
        videoEl.style.objectFit = "contain";
        videoEl.style.width = "100%";
        videoEl.style.height = "auto";
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
