<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clappr Player</title>
  <!-- Clappr Builds -->
  <script src="//cdn.jsdelivr.net/npm/@clappr/player@0.11.16/dist/clappr.min.js"></script>
  <script src='//cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js'></script>
  <!-- P2PEngine -->
  <script src="//cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
    }
    #player {
      width: 100%;
      height: 100%;
    }
    /* For fullscreen: no black margins */
    :fullscreen #player {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>
<body>
<div id="player"></div>
<h3>download info:</h3>
<p id="info"></p>
<script>
  // Obtener parámetro ?stream=...
  const params = new URLSearchParams(window.location.search);
  const stream = params.get("stream") || "telemundo";

  // Construir URL con el proxy
  const sourceUrl = "https://canchatv.online/tvtvhd/proxy2.php?stream=" + stream;

  var p2pConfig = {
    swFile: './sw.js',
    live: true,
    getStats: function (totalP2PDownloaded, totalP2PUploaded, totalHTTPDownloaded) {
      var total = totalHTTPDownloaded + totalP2PDownloaded;
      document.querySelector('#info').innerText =
        `p2p ratio: ${Math.round(totalP2PDownloaded/total*100)}%, saved traffic: ${totalP2PDownloaded}KB, uploaded: ${totalP2PUploaded}KB`;
    }
  };

  var player = new Clappr.Player({
    parentId: "#player",
    autoPlay: true,
    plugins: [LevelSelector],
    width: "100%",
    height: "100%",
    fullscreenEnabled: true,
  });

  P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
    player.load({source: sourceUrl});
    p2pConfig.hlsjsInstance = player.core.getCurrentPlayback()?._hls;
    var engine = new P2PEngineHls(p2pConfig);
  });
</script>
</body>
</html>
