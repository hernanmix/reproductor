<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clappr Player</title>
  <script src="//cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
  <script src="//cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
    }
    #player {
      width: 100%;
      height: 100%;
    }
    :fullscreen #player {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>
<body>
<div id="player"></div>
<script>
  // Obtener parámetro ?stream=...
  const params = new URLSearchParams(window.location.search);
  const stream = params.get("stream") || "telemundo";

  // Construir URL del proxy
  const sourceUrl = "https://canchatv.online/tvtvhd/proxy2.php?stream=" + stream;

  // Crear reproductor Clappr
  var player = new Clappr.Player({
    source: sourceUrl,
    parentId: "#player",
    autoPlay: true,
    width: "100%",
    height: "100%",
    plugins: [LevelSelector],
    fullscreenEnabled: true,
  });
</script>
</body>
</html>
