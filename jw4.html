<!-- JWPlayer -->
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
  jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream");

    if (!stream) {
      console.error("Falta el parámetro ?stream=");
      return;
    }

    // Construir URL final hacia tu proxy
    const finalUrl = "https://hsportsec.42web.io/proxy2.php?stream=" + stream;

    // Configuración JWPlayer
    jwplayer("player").setup({
      playlist: [{
        sources: [{
          file: finalUrl,
          type: "hls"
        }]
      }],
      autostart: true,
      width: "100%",
      height: "100%",
      stretching: "uniform",
      skin: { name: "cyan" },
      logo: {
        file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg",
        position: "top-right",
        margin: 20,
        link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T"
      }
    });

    // Ajuste fullscreen
    jwplayer("player").on("fullscreen", function(e) {
      if (e.fullscreen) {
        jwplayer("player").setConfig({ stretching: "exactfit" });
      } else {
        jwplayer("player").setConfig({ stretching: "uniform" });
      }
    });
  });
</script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
  }

  #player {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
  }
</style>

<div id="player"></div>
