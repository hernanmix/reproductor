<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor con Exit Fullscreen</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .player-container {
        position: relative;
        width: 100%;
        height: 100%;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .exit-button {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background-color: rgba(0,0,0,0.4);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 9999;
        transition: background-color 0.3s;
        display: none; /* Oculto por defecto */
    }

    .exit-button:hover {
        background-color: rgba(0,0,0,0.7);
    }

    .exit-button svg {
        width: 24px;
        height: 24px;
        fill: #fff;
    }
</style>
</head>
<body>
<div class="player-container">
    <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>

    <!-- Botón salir fullscreen -->
    <div class="exit-button" id="exitBtn" onclick="exitToHome()">
        <svg viewBox="0 0 24 24">
            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
        </svg>
    </div>
</div>

<script>
    // Obtener canal desde URL
    function getChannelFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('channel') || 'dsportsplus';
    }

    const channel = getChannelFromURL();
    const iframe = document.getElementById('videoPlayer');
    iframe.src = `https://m-3-u-player--hermixervdj94.replit.app/?channel=${channel}`;

    const exitBtn = document.getElementById('exitBtn');

    // Función para salir a inicio
    function exitToHome() {
        // Salir de fullscreen si está activo
        if (document.fullscreenElement) {
            document.exitFullscreen();
        } 
        // Redirigir a página de inicio
        window.location.href = "/"; // Cambia "/" a tu URL de inicio
    }

    // Detectar fullscreen
    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            exitBtn.style.display = 'flex'; // Mostrar botón
        } else {
            exitBtn.style.display = 'none'; // Ocultar botón
        }
    });

    // También mostrar al iniciar si iframe es fullscreen automáticamente
    if (document.fullscreenElement) {
        exitBtn.style.display = 'flex';
    }
</script>
</body>
</html>
