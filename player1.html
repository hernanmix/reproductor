<head>
<meta charset="UTF-8">

<title>Reproductor con Exit FS</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    .player-container {
        position: fixed; /* ocupa toda la pantalla */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    .exit-button {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background-color: rgba(0,0,0,0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 9999;
        transition: background-color 0.3s;
    }
    .exit-button:hover { background-color: rgba(0,0,0,0.6); }
    .exit-button svg { width: 24px; height: 24px; fill: #fff; }
</style>
</head>
<body>

<div class="player-container">
    <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
    // ✅ Obtener parámetros de la URL y normalizar
    function getChannelParam() {
        const params = new URLSearchParams(window.location.search);
        let channel = params.get("channel");
        if (!channel) {
            channel = "espn"; // valor por defecto si no hay canal
        }
        return channel;
    }

    const iframe = document.getElementById('videoPlayer');
    const channel = getChannelParam();

    // ✅ Construir la URL final con inapp=1
    iframe.src = `https://ola-bot--hermixervdj94.replit.app/?channel=${channel}&inapp=1`;

    // Botón de salida opcional
    function exitFs() {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        window.location.href = "go:exitFs"; 
    }
</script>
