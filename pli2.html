<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui">
    <meta name="referrer" content="no-referrer">
    <style type="text/css">
        html, body {width:100%;height:100%;margin:auto;overflow: hidden;}
        body {display:flex;background:black;}
        #mse {flex:auto;}
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
</head>
<body>
<div id="mse"></div>

<script src="https://cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js" charset="utf-8"></script>
<script src="https://cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js" charset="utf-8"></script>
<script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>

<script type="text/javascript">
async function initPlayer() {
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream") || "espn";

    // 🔹 Cargar lista JSON desde GitHub
    const response = await fetch("https://hernanmix.github.io/reproductor/channels2.json");
    const data = await response.json();

    // 🔹 Buscar URL del canal
    const sourceUrl = data.channels[stream];
    if (!sourceUrl) {
        console.error("Canal no encontrado en JSON:", stream);
        return;
    }

    var p2pConfig = {
        swFile: './sw.js',
        live: true
    };

    P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
        var player = new window.Player({
            id: 'mse',
            isLive: true,
            url: sourceUrl,
            autoplay: true,
            playsinline: true,
            height: window.innerHeight,
            width: window.innerWidth,
            plugins: P2pEngineHls.isMSESupported() ? [window.HlsJsPlugin] : [],
            hlsJsPlugin: {
                hlsOpts: {}
            }
        });

        const events = window.Player.Events;
        [events.READY, events.URL_CHANGE].forEach(event => {
            player.on(event, () => {
                if (P2pEngineHls.isMSESupported()) {
                    p2pConfig.hlsjsInstance = player.getPlugin("HlsJsPlugin").hls;
                }
                new P2pEngineHls(p2pConfig);
            });
        });
    });
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
