<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name=viewport content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <style>
    html, body {width:100%;height:100%;margin:0;overflow:hidden;background:black;}
    body {display:flex;}
    #mse {flex:auto;}
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
</head>
<body>
<div id="mse"></div>

<script src="https://cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js"></script>

<script>
async function initPlayer() {
  const params = new URLSearchParams(window.location.search);
  const stream = params.get("stream") || "espn";

  try {
    // 1. Leer channels2.json
    const response = await fetch("https://hernanmix.github.io/reproductor/channels2.json");
    const data = await response.json();

    // 2. Buscar URL del proxy
    const proxyUrl = data.channels[stream];
    if (!proxyUrl) {
      console.error("Canal no encontrado en JSON:", stream);
      return;
    }

    // 3. Llamar al proxy
    const proxyResponse = await fetch(proxyUrl);
    const proxyData = await proxyResponse.json();

    if (!proxyData.url) {
      console.error("El proxy no devolvió URL válida para", stream);
      return;
    }

    // 4. Crear reproductor con el .m3u8 real
    var player = new window.Player({
      id: 'mse',
      isLive: true,
      url: proxyData.url,   // 🔹 Aquí se usa solo el campo "url"
      autoplay: true,
      playsinline: true,
      height: window.innerHeight,
      width: window.innerWidth,
      plugins: [window.HlsJsPlugin],
      hlsJsPlugin: { hlsOpts: {} }
    });

  } catch (err) {
    console.error("Error al cargar:", err);
  }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
