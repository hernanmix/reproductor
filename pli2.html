<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name=viewport content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <style>
    html, body {width:100%;height:100%;margin:0;overflow:hidden;background:black;}
    body {display:flex;}
    #mse {flex:auto;}
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
</head>
<body>
<div id="mse"></div>

<script src="https://cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js"></script>

<script>
async function initPlayer() {
  const params = new URLSearchParams(window.location.search);
  const stream = params.get("stream") || "espn";

  // 1. Llamar directamente al proxy
  const proxyResponse = await fetch("https://hsportshd.kesug.com/proxy.php?stream=" + stream);
  const proxyData = await proxyResponse.json();

  if (!proxyData.url) {
    console.error("El proxy no devolvió URL válida para", stream);
    return;
  }

  // 2. Usar solo proxyData.url como fuente
  var player = new window.Player({
    id: 'mse',
    isLive: true,
    url: proxyData.url,   // 🔹 Aquí va el .m3u8 real
    autoplay: true,
    playsinline: true,
    height: window.innerHeight,
    width: window.innerWidth,
    plugins: [window.HlsJsPlugin],
    hlsJsPlugin: { hlsOpts: {} }
  });
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
