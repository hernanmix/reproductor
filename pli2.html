<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor con JSON + Proxy</title>
  <script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ovenplayer/dist/ovenplayer.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
    }
    #player_id {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="player_id"></div>
<script>
  async function initPlayer() {
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream") || "espn";

    // 🔹 Cargar lista JSON desde GitHub
    const response = await fetch("https://hernanmix.github.io/reproductor/channels2.json");
    const data = await response.json();

    // 🔹 Buscar URL del proxy para el canal
    const proxyUrl = data.channels[stream];
    if (!proxyUrl) {
      console.error("Canal no encontrado en JSON:", stream);
      return;
    }

    // 🔹 Llamar al proxy para obtener el .m3u8 real
    const proxyResponse = await fetch(proxyUrl);
    const proxyData = await proxyResponse.json();

    if (!proxyData.url) {
      console.error("El proxy no devolvió URL válida para", stream);
      return;
    }

    // 🔹 Crear reproductor OvenPlayer con el .m3u8 real
    OvenPlayer.create('player_id', {
      sources: [
        {
          label: proxyData.channel,
          type: 'hls',
          file: proxyData.url
        }
      ]
    });
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
