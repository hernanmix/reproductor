<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui">
    <meta name="referrer" content="no-referrer">
    <style>
        html, body {width:100%;height:100%;margin:0;overflow:hidden;background:black;}
        body {display:flex;}
        #mse {flex:auto;}
    </style>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
    <script>
        window.addEventListener('resize',function(){
            document.getElementById('mse').style.height=window.innerHeight+'px';
        });
    </script>
</head>
<body>
<div id="mse"></div>

<script src="//cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>

<script type="text/javascript">
async function initPlayer() {
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream") || "espn";

    try {
        // 1. Llamar al JSON en GitHub Pages
        const response = await fetch("https://hernanmix.github.io/reproductor/channels.json");
        const data = await response.json();

        // Si el JSON es un objeto único
        let channelUrl = null;
        if (data.channel === stream) {
            channelUrl = data.url;
        }

        // Si el JSON es un array de canales (ejemplo futuro)
        if (Array.isArray(data)) {
            const found = data.find(c => c.channel === stream);
            if (found) channelUrl = found.url;
        }

        if (!channelUrl) {
            console.error("No se encontró el canal en el JSON");
            return;
        }

        // 2. Configuración P2P
        var p2pConfig = { swFile: './sw.js', live: true };

        // 3. Crear reproductor con el .m3u8 real
        P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
            var player = new window.Player({
                id: 'mse',
                isLive: true,
                url: channelUrl,   // 🔹 Aquí va el campo "url" del JSON
                autoplay: true,
                playsinline: true,
                height: window.innerHeight,
                width: window.innerWidth,
                plugins: P2pEngineHls.isMSESupported() ? [window.HlsJsPlugin] : [],
                hlsJsPlugin: { hlsOpts: {} }
            });

            const events = window.Player.Events;
            [events.READY, events.URL_CHANGE].forEach(event => {
                player.on(event, () => {
                    if (P2pEngineHls.isMSESupported()) {
                        p2pConfig.hlsjsInstance = player.getPlugin("HlsJsPlugin").hls;
                    }
                    new P2pEngineHls(p2pConfig);
                });
            });
        });
    } catch (err) {
        console.error("Error al cargar el JSON:", err);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
