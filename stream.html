<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor</title>
  <style>
    * { margin: 0; padding: 0; }
    body, html { height: 100%; background: #000; overflow-y: hidden; }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      pointer-events: all;
      position: fixed;
    }
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.7);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      z-index: 9999;
      transition: all 0.3s ease;
      opacity: 0.6;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-button:hover {
      background: rgba(0,0,0,0.7);
      color: #fff;
      opacity: 1;
      transform: scale(1.02);
    }
    .back-button span {
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <button class="back-button" onclick="goBack()">
    <span>←</span> Volver
  </button>
  <iframe id="player" allowfullscreen></iframe>

  <script>
    function goBack() {
      window.history.back();
    }

    // 🔹 Definir canales
    const channels = {
      "espn": "https://la14hd.com/vivo/canales.php?stream=espn",
      "fox": "https://la14hd.com/vivo/canales.php?stream=fox",
      "tnt": "https://la14hd.com/vivo/canales.php?stream=tnt",
      "hypermotion1": "https://la14hd.com/vivo/canales.php?stream=hypermotion1"
    };

    // 🔹 Obtener parámetro ?stream=nombre
    const params = new URLSearchParams(window.location.search);
    const channelKey = params.get("stream");
    const streamUrl = channels[channelKey] || channels["hypermotion1"]; // fallback

    // 🔹 Asignar al iframe
    document.getElementById("player").src = streamUrl;
  </script>
</body>
</html>
