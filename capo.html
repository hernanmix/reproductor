<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reproductor Fútbol</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
  <style>
    html, body {margin:0;padding:0;height:100%;width:100%;background:#000;}
    #mse {height:100%;width:100%;}
    video {object-fit:fill !important;}
  </style>
</head>
<body>
<div id="mse"></div>
<script src="//cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js"></script>
<script>
  // 🔹 Lógica del parámetro ?futbol=
  const params = new URLSearchParams(window.location.search);
  const futbol = params.get("futbol");
  let finalUrl = "";

  if (futbol === "1") {
    finalUrl = "https://canchatv.online/tvtvhd/proxy3.php?player=capodeportes3";
  }
  if (futbol === "2") {
    finalUrl = "https://canchatv.online/tvtvhd/proxy3.php?player=capodeportes4";
  }
  // puedes seguir agregando más opciones

  if (finalUrl) {
    var player = new window.Player({
      id: 'mse',
      isLive: true,
      url: finalUrl,
      autoplay: true,
      playsinline: true,
      height: window.innerHeight,
      width: window.innerWidth,
      plugins: [window.HlsJsPlugin],
      hlsJsPlugin: { hlsOpts: {} }
    });
  } else {
    document.body.innerHTML = "<p style='color:white;text-align:center;'>No se encontró parámetro ?futbol=</p>";
  }
</script>
</body>
</html>
