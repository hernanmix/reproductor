<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reproductor Fútbol</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<script>
  // 🔹 Lógica del parámetro ?futbol=
  const params = new URLSearchParams(window.location.search);
  const futbol = params.get("futbol");

  // 🔹 URL base de transmisión
  let finalUrl = "";
  if (futbol) {
    // aquí puedes mapear valores de futbol a distintos canales
    if (futbol === "1") {
      finalUrl = "https://capo7play.com/capo2.php?player=mobile&live=capodeportes3";
    }
    if (futbol === "2") {
      finalUrl = "https://capo7play.com/capo2.php?player=mobile&live=capodeportes3";
    }
    // puedes seguir agregando más opciones
  }

  // 🔹 Insertar el iframe dinámicamente
  if (finalUrl) {
    document.write('<iframe src="' + finalUrl + '" allowfullscreen></iframe>');
  } else {
    document.write('<p style="color:white;text-align:center;">No se encontró parámetro ?futbol=</p>');
  }
</script>
</body>
</html>
