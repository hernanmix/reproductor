<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">

  <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
  <script>
    jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

    document.addEventListener("DOMContentLoaded", function () {
      // URL del proxy con parámetro ?stream=tntsports
      const finalUrl = "https://canchatv.online/tvtvhd/proxy3.php?stream=tntsports";

      const playerInstance = jwplayer("player").setup({
        playlist: [{
          sources: [{
            file: finalUrl,
            type: "hls"
          }]
        }],
        autostart: true,
        width: "100%",
        height: "100%",
        stretching: "uniform",
        skin: { name: "custom" }, // 👈 skin personalizada
        logo: {
          file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg",
          position: "top-right",
          margin: 20,
          link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T"
        }
      });

      // Al entrar en fullscreen → forzar fill
      playerInstance.on("fullscreen", function(e) {
        if (e.fullscreen) {
          playerInstance.setConfig({ stretching: "exactfit" });
        } else {
          playerInstance.setConfig({ stretching: "uniform" });
        }
      });
    });
  </script>

  <!-- Skin personalizada -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #player {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
    }

    /* Barra de control */
    .jw-controlbar {
      background: rgba(0, 0, 0, 0.8) !important;
      height: 50px;
    }

    /* Botones principales */
    .jw-icon-play, .jw-icon-pause, .jw-icon-volume, .jw-icon-fullscreen {
      color: #00ff66 !important;
    }

    /* Barra de progreso */
    .jw-progress {
      background-color: #00ff66 !important;
    }

    /* Texto de tiempo */
    .jw-text-elapsed, .jw-text-duration {
      color: #00ffcc !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="player"></div>
</body>
</html>
