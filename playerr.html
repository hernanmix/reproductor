<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">

  <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
  <script>
    jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

    document.addEventListener("DOMContentLoaded", async function () {
      const params = new URLSearchParams(window.location.search);
      if (!params.has("stream")) {
        console.error("Falta el parámetro ?stream=");
        return;
      }

      const proxyBase = "https://canchatv.online/tvtvhd/proxy3.php";
      const finalUrl = proxyBase + "?" + params.toString();

      let streamUrl = null;

      try {
        // Intentar leer como JSON
        const response = await fetch(finalUrl);
        const text = await response.text();

        try {
          const data = JSON.parse(text);
          if (data.url) {
            streamUrl = data.url;
          }
        } catch (e) {
          // No era JSON → usar la URL del proxy directamente
          streamUrl = finalUrl;
        }
      } catch (err) {
        console.error("Error al cargar el proxy:", err);
        return;
      }

      if (!streamUrl) {
        console.error("No se encontró enlace válido");
        return;
      }

      jwplayer("player").setup({
        playlist: [{
          sources: [{
            file: streamUrl,
            type: "hls"
          }]
        }],
        autostart: true,
        width: "100%",
        height: "100%",
        stretching: "uniform",
        skin: { name: "cyan" },
        logo: {
          file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg",
          position: "top-right",
          margin: 20,
          link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T"
        }
      });

      jwplayer("player").on("fullscreen", function(e) {
        if (e.fullscreen) {
          jwplayer("player").setConfig({ stretching: "exactfit" });
        } else {
          jwplayer("player").setConfig({ stretching: "uniform" });
        }
      });
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #player {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="player"></div>
</body>
</html>
