<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Disney+2 | XGPlayer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }
    #mse {
      position:fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background:#000;
    }
    video {
      width:100%;
      height:100%;
      object-fit:cover; /* 🔹 rellena pantalla sin márgenes negros */
      background:#000;
    }
  </style>
</head>
<body>
<div id="mse"></div>

<script src="//cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>

<script>
  const manifestUri = "https://linear-akc-sa-west-1.media.dssott.com/dvt2=exp=1776278734~url=%2Fclt1%2Fva02%2Fdisneyplus%2Fchannel%2F921e1311-bb26-43dd-84a6-9e2284959712-1773070527132%2F~psid=6f25ff00-39f1-4849-9678-31dc1853347f~aid=fe6f40ef-342c-4e9c-b4d1-9a50e4aeb9e1~did=55b5227b-d9b3-46cc-b367-194e29e5c730~country=EC~kid=k02~hmac=ae8c0d14f959cfa3d648ca26a410ce26385ea1ade5be9120ff283e458ab5d353/clt1/va02/disneyplus/channel/921e1311-bb26-43dd-84a6-9e2284959712-1773070527132/ctr-all-sliding-alt1.m3u8?r=1080&v=1&hash=82b614d9e6d93224b1eaa1442cd6e5c07d9789e9";

  const clearKeys = {
    "8535b94608cf48f6bc821fd0c50670a2": "c3a912c60d086f3fcac805602168e2f8"
  };

  var p2pConfig = {
    swFile: './sw.js',
    live: true
  };

  P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
    var player = new window.Player({
      id: 'mse',
      isLive: true,
      url: manifestUri,
      autoplay: true,
      playsinline: true,
      width: window.innerWidth,
      height: window.innerHeight,
      plugins: P2pEngineHls.isMSESupported() ? [window.HlsJsPlugin] : [],
      hlsJsPlugin: {
        hlsOpts: {
          drmSystemOptions: {
            'org.w3.clearkey': {
              clearkeys: clearKeys
            }
          }
        }
      }
    });

    const events = window.Player.Events;
    [events.READY, events.URL_CHANGE].forEach(event => {
      player.on(event, () => {
        if (P2pEngineHls.isMSESupported()) {
          p2pConfig.hlsjsInstance = player.getPlugin("HlsJsPlugin").hls;
        }
        new P2pEngineHls(p2pConfig);
      });
    });

    // 🔹 Forzar fullscreen horizontal y rellenado
    player.on('fullscreenChange', (isFullscreen) => {
      const videoEl = document.querySelector('video');
      if (isFullscreen) {
        videoEl.style.objectFit = "cover"; // rellena pantalla
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(err => console.log(err));
        }
      } else {
        videoEl.style.objectFit = "contain"; // vuelve al modo normal
      }
    });
  });
</script>
</body>
</html>
