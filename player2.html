<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimal-ui">
<title>Reproductor Horizontal</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    .player-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        /* Forzar horizontal en móviles si es necesario */
        max-width: 100vw;
        max-height: 100vh;
    }
    /* Botón retroceso fijo y transparente */
    .exit-button {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background-color: rgba(0,0,0,0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 9999;
        transition: background-color 0.3s;
    }
    .exit-button:hover {
        background-color: rgba(0,0,0,0.6);
    }
    .exit-button svg {
        width: 24px;
        height: 24px;
        fill: #fff;
    }
</style>
</head>
<body>

<div class="player-container">
    <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<!-- Botón de retroceso siempre visible -->
<div class="exit-button" onclick="exitFs()">
    <svg viewBox="0 0 24 24">
        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
    </svg>
</div>

<script>
    // Obtener canal desde URL
    function getChannelFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('channel') || 'dsportsplus';
    }

    const channel = getChannelFromURL();
    const iframe = document.getElementById('videoPlayer');

    // Cargar URL del reproductor (Replit)
    iframe.src = `https://m-3-u-player--hermixervdj94.replit.app/?channel=${channel}`;

    // Función para salir de fullscreen y volver al inicio
    function exitFs() {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        window.location.href = "go:exitFs"; 
    }

    // Detectar cambios de fullscreen y mantener botón visible
    document.addEventListener('fullscreenchange', () => {
        const exitBtn = document.querySelector('.exit-button');
        exitBtn.style.display = 'flex'; // siempre visible
    });

    // Forzar pantalla completa horizontal al abrir en móviles
    function requestFullscreenHorizontal() {
        const el = document.documentElement;
        if (el.requestFullscreen) {
            el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen();
        }
    }

    // Intentar fullscreen automáticamente (opcional)
    window.addEventListener('load', () => {
        requestFullscreenHorizontal();
    });
</script>

</body>
</html>
