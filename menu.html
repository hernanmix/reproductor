<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HSP⚽RTSEC</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb59a",
                        "on-surface-variant": "#c3c5d8",
                        "outline": "#8d90a2",
                        "primary-fixed-dim": "#b0c6ff",
                        "outline-variant": "#434656",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "on-primary": "#002d6e",
                        "tertiary": "#ffb59a",
                        "primary-container": "#0069ef",
                        "on-background": "#e5e2e1",
                        "on-primary-container": "#f6f6ff",
                        "secondary-fixed": "#dce1ff",
                        "on-secondary": "#142b6f",
                        "surface": "#131313",
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "error-container": "#93000a",
                        "secondary": "#b6c4ff",
                        "on-tertiary-fixed-variant": "#802a00",
                        "secondary-container": "#2e4287",
                        "on-secondary-container": "#9eb2fe",
                        "primary": "#b0c6ff",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary-fixed": "#001550",
                        "tertiary-container": "#c74500",
                        "background": "#131313",
                        "secondary-fixed-dim": "#b6c4ff",
                        "on-primary-fixed-variant": "#00429b",
                        "on-primary-fixed": "#001945",
                        "on-secondary-fixed-variant": "#2e4287",
                        "on-surface": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "tertiary-fixed": "#ffdbcf",
                        "on-tertiary-container": "#fff4f1",
                        "primary-fixed": "#d9e2ff",
                        "surface-bright": "#3a3939",
                        "surface-variant": "#353534",
                        "surface-tint": "#b0c6ff",
                        "on-tertiary-fixed": "#380d00",
                        "surface-dim": "#131313",
                        "error": "#ffb4ab",
                        "on-tertiary": "#5b1b00",
                        "on-error": "#690005",
                        "inverse-primary": "#0058ca"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0e0e0e;
            color: #e5e2e1;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #2e4287;
            border-radius: 10px;
        }
        .bloom-effect:active {
            box-shadow: 0 0 20px rgba(176, 198, 255, 0.4);
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col">
    <!-- TopAppBar -->
    <header class="sticky top-0 w-full z-[9999] bg-[#131313]/90 backdrop-blur-xl border-b border-outline-variant/10 shadow-2xl">
        <div class="flex items-center justify-center px-6 h-16 w-full">
            <h1 class="font-['Manrope'] font-extrabold tracking-tighter text-2xl md:text-3xl text-[#e5e2e1] select-none">
                HSP⚽RTSEC
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-full relative bg-surface-container-lowest overflow-hidden">
        <iframe class="w-full h-full border-none" id="content-frame" src="https://hsports4hd.blogspot.com/p/hsportstv.html?m=1" title="Main Content Container"></iframe>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full z-[9999] flex justify-center items-center pb-8 pointer-events-none px-4">
        <div class="pointer-events-auto bg-[#353534]/85 backdrop-blur-2xl rounded-full p-1.5 flex justify-between items-center shadow-2xl shadow-black/50 border border-outline-variant/20 w-full max-w-lg mx-auto">
            <!-- Inicio -->
            <button class="nav-item flex-1 flex flex-col items-center justify-center bg-[#2e4287] text-[#b0c6ff] rounded-full py-2.5 transition-all duration-300 ease-out bloom-effect" onclick="changeSource('https://hsports4hd.blogspot.com/p/hsportstv.html?m=1', this)">
                <span class="material-symbols-outlined">home</span>
                <span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-0.5 hidden sm:block">Inicio</span>
            </button>
            <!-- TV -->
            <button class="nav-item flex-1 flex flex-col items-center justify-center text-[#8d90a2] py-2.5 hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/tv.html', this)">
                <span class="material-symbols-outlined">live_tv</span>
                <span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-0.5 hidden sm:block">TV</span>
            </button>
            <!-- Donar -->
            <button class="nav-item flex-1 flex flex-col items-center justify-center text-[#8d90a2] py-2.5 hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/donar.html', this)">
                <span class="material-symbols-outlined">volunteer_activism</span>
                <span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-0.5 hidden sm:block">Donar</span>
            </button>
            <!-- Disney+ -->
            <button class="nav-item flex-1 flex flex-col items-center justify-center text-[#8d90a2] py-2.5 hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/disney2.html', this)">
                <span class="material-symbols-outlined">subscriptions</span>
                <span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-0.5 hidden sm:block">Disney+</span>
            </button>
            <!-- Ads -->
            <button class="nav-item flex-1 flex flex-col items-center justify-center text-[#8d90a2] py-2.5 hover:text-white transition-all" onclick="showAdsModal()">
                <span class="material-symbols-outlined">ad_units</span>
                <span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-0.5 hidden sm:block">Ads</span>
            </button>
        </div>
    </nav>

    <!-- Modal Ads -->
    <div class="hidden fixed inset-0 z-[10000] bg-black/90 backdrop-blur-xl flex items-center justify-center p-4" id="ads-modal">
        <div class="bg-[#1c1b1b] rounded-2xl w-full max-w-xl shadow-2xl border border-outline-variant/30 overflow-hidden">
            <div class="p-6 md:p-8 text-center space-y-6">
                <div class="space-y-2">
                    <h2 class="text-xl md:text-2xl font-extrabold text-[#b0c6ff] tracking-tight">HSP⚽RTSEC Premium Access</h2>
                    <p class="text-on-surface-variant font-semibold text-xs md:text-sm">Espere, ayúdanos a seguir con las transmisiones</p>
                </div>
                <div class="aspect-video w-full rounded-xl overflow-hidden bg-black shadow-inner relative border border-outline-variant/20">
                    <iframe allow="autoplay" class="w-full h-full" frameborder="0" id="ads-iframe" src=""></iframe>
                </div>
                <div class="flex flex-col items-center justify-center py-2">
                    <div class="relative flex items-center justify-center">
                        <svg class="w-16 h-16 md:w-20 md:h-20 -rotate-90">
                            <circle class="text-outline-variant/20" cx="50%" cy="50%" fill="transparent" r="36" stroke="currentColor" stroke-width="4"></circle>
                            <circle class="text-primary" cx="50%" cy="50%" fill="transparent" id="timer-progress" r="36" stroke="currentColor" stroke-dasharray="226.2" stroke-dashoffset="0" stroke-width="4" style="transition: stroke-dashoffset 1s linear;"></circle>
                        </svg>
                        <span class="absolute text-primary font-black text-xl md:text-2xl" id="countdown-text">15</span>
                    </div>
                    <p class="text-[9px] md:text-[10px] uppercase font-bold tracking-[0.2em] text-outline mt-4">Cerrando automáticamente</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeSource(url, element) {
            const iframe = document.getElementById('content-frame');
            if (iframe.src !== url) {
                iframe.src = url;
            }
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                item.className = "nav-item flex-1 flex flex-col items-center justify-center text-[#8d90a2] py-2.5 hover:text-white transition-all";
            });
            element.className = "nav-item flex-1 flex flex-col items-center justify-center bg-[#2e4287] text-[#b0c6ff] rounded-full py-2.5 transition-all duration-300 ease-out bloom-effect";
        }

        let countdownInterval;
        function showAdsModal() {
            const modal = document.getElementById('ads-modal');
            const adsIframe = document.getElementById('ads-iframe');
            const countdownText = document.getElementById('countdown-text');
            const timerProgress = document.getElementById('timer-progress');
            modal.classList.remove('hidden');
            adsIframe.src = "https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db";
            let count = 15;
            const total = 15;
            countdownText.innerText = count;
            const circumference = 2 * Math.PI * 36;
            timerProgress.style.strokeDashoffset = 0;
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                count--;
                countdownText.innerText = count;
                const offset = circumference - (count / total) * circumference;
                timerProgress.style.strokeDashoffset = offset;
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    closeAdsModal();
                }
            }, 1000);
        }

        function closeAdsModal() {
            const modal = document.getElementById('ads-modal');
            const adsIframe = document.getElementById('ads-iframe');
            modal.classList.add('hidden');
            adsIframe.src = "";
        }
    </script>
</body>
</html>
