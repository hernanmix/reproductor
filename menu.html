<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HSP⚽RTSEC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#b0c6ff",
                        "surface": "#000000",
                        "surface-container": "#131313",
                        "outline-variant": "#434656",
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #e5e2e1;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Shimmer effect for Header Logo & Nav - 4 seconds */
        @keyframes shimmer-effect {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .shimmer-text {
            background: linear-gradient(90deg, #ffffff 0%, #d1d5db 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-effect 4s infinite linear;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            display: inline-block;
        }

        .shimmer-nav {
            background: linear-gradient(90deg, #131313 0%, #1a1a1a 50%, #131313 100%);
            background-size: 200% 100%;
            animation: shimmer-effect 4s infinite linear;
        }

        /* Green soccer ball icon style */
        .soccer-green {
            color: #22c55e; /* Tailwind green-500 */
            -webkit-text-fill-color: #22c55e;
            display: inline-block;
        }

        /* Smart TV Focus visibility */
        .nav-item:focus {
            outline: 3px solid #b0c6ff;
            background-color: rgba(176, 198, 255, 0.2);
            border-radius: 8px;
        }

        #content-frame {
            height: calc(100vh - 64px - 64px); /* Header 64px + Nav 64px */
            width: 100%;
            border: none;
        }

        @media (max-width: 640px) {
            #content-frame {
                height: calc(100vh - 64px - 72px); 
            }
        }
    </style>
</head>
<body class="flex flex-col bg-black">
<!-- TopAppBar: Solid Black, Centered Title with 4s shimmer -->
<header class="h-16 w-full z-[9999] bg-black flex items-center justify-center shrink-0 border-b border-white/5">
<h1 class="font-['Manrope'] font-extrabold tracking-tighter text-2xl md:text-3xl select-none shimmer-text">
        HSP<span class="soccer-green">⚽</span>RTSEC
    </h1>
</header>
<!-- Main Content: Full width and height between bars -->
<main class="flex-grow w-full relative bg-black">
<iframe class="w-full h-full" id="content-frame" src="https://hsports4hd.blogspot.com/p/hsportstv.html?m=1" title="Main Content Container"></iframe>
</main>
<!-- Bottom Navigation: Full width, Fixed bottom, background #131313 -->
<nav class="fixed bottom-0 left-0 w-full h-[64px] sm:h-[72px] z-[9999] shimmer-nav border-t border-white/5">
<div class="flex justify-around items-center h-full w-full max-w-none px-2">
<!-- Inicio -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center bg-[#2e4287] text-[#b0c6ff] transition-all duration-300" onclick="changeSource('https://hsports4hd.blogspot.com/p/hsportstv.html?m=1', this)">
<span class="material-symbols-outlined">home</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Inicio</span>
</button>
<!-- TV -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center text-[#8d90a2] hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/tv.html', this)">
<span class="material-symbols-outlined">live_tv</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">TV</span>
</button>
<!-- Donar -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center text-[#8d90a2] hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/donar.html', this)">
<span class="material-symbols-outlined">volunteer_activism</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Donar</span>
</button>
<!-- Disney+ -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center text-[#8d90a2] hover:text-white transition-all" onclick="changeSource('https://hsports4hd.blogspot.com/2026/02/disney2.html', this)">
<span class="material-symbols-outlined">subscriptions</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Disney+</span>
</button>
<!-- Ads -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center text-[#8d90a2] hover:text-white transition-all" onclick="showAdsModal()">
<span class="material-symbols-outlined">ad_units</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Ads</span>
</button>
<!-- Salir -->
<button class="nav-item flex-1 h-full flex flex-col items-center justify-center text-[#8d90a2] hover:text-red-400 transition-all" onclick="exitApp()">
<span class="material-symbols-outlined">logout</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Salir</span>
</button>
</div>
</nav>
<!-- Modal Ads -->
<div class="hidden fixed inset-0 z-[10000] bg-black/95 backdrop-blur-3xl flex items-center justify-center p-4" id="ads-modal">
<div class="bg-[#0a0a0a] rounded-3xl w-full max-w-xl shadow-2xl border border-white/10 overflow-hidden">
<div class="p-6 md:p-8 text-center space-y-8">
<div class="space-y-2">
<h2 class="text-xl md:text-2xl font-extrabold text-[#b0c6ff] tracking-tight uppercase">HSP⚽RTSEC Premium</h2>
<p class="text-white/60 font-medium text-sm md:text-base">Espera un momento para continuar</p>
</div>
<div class="aspect-video w-full rounded-2xl overflow-hidden bg-black shadow-inner relative border border-white/5">
<iframe allow="autoplay" class="w-full h-full" frameborder="0" id="ads-iframe" src=""></iframe>
</div>
<div class="flex flex-col items-center justify-center py-6">
<div class="relative flex items-center justify-center scale-150">
<svg class="w-24 h-24 -rotate-90">
<circle class="text-white/5" cx="48" cy="48" fill="transparent" r="44" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-primary" cx="48" cy="48" fill="transparent" id="timer-progress" r="44" stroke="currentColor" stroke-dasharray="276.46" stroke-dashoffset="0" stroke-width="6" style="transition: stroke-dashoffset 1s linear;"></circle>
</svg>
<span class="absolute text-white font-black text-4xl tabular-nums" id="countdown-text">15</span>
</div>
<div class="mt-12 space-y-2">
<p class="text-white text-lg font-bold">Ayudanos con el anuncio 15 segundos</p>
<p class="text-[10px] uppercase font-bold tracking-[0.4em] text-white/30">Cerrando automáticamente</p>
</div>
</div>
</div>
</div>
</div>
<script>
    function changeSource(url, element) {
        const iframe = document.getElementById('content-frame');
        if (iframe.src !== url) {
            iframe.src = url;
        }
        const items = document.querySelectorAll('.nav-item');
        items.forEach(item => {
            item.classList.remove('bg-[#2e4287]', 'text-[#b0c6ff]');
            item.classList.add('text-[#8d90a2]');
        });
        element.classList.add('bg-[#2e4287]', 'text-[#b0c6ff]');
        element.classList.remove('text-[#8d90a2]');
    }

    let countdownInterval;
    function showAdsModal() {
        const modal = document.getElementById('ads-modal');
        const adsIframe = document.getElementById('ads-iframe');
        const countdownText = document.getElementById('countdown-text');
        const timerProgress = document.getElementById('timer-progress');
        
        modal.classList.remove('hidden');
        adsIframe.src = "https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db";
        
        let count = 15;
        const total = 15;
        countdownText.innerText = count;
        const circumference = 2 * Math.PI * 44;
        timerProgress.style.strokeDashoffset = 0;
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            count--;
            countdownText.innerText = count;
            const offset = circumference - (count / total) * circumference;
            timerProgress.style.strokeDashoffset = offset;
            if (count <= 0) {
                clearInterval(countdownInterval);
                closeAdsModal();
            }
        }, 1000);
    }

    function closeAdsModal() {
        const modal = document.getElementById('ads-modal');
        const adsIframe = document.getElementById('ads-iframe');
        modal.classList.add('hidden');
        adsIframe.src = "";
    }

    /**
     * Correct implementation for 'Salir' across AppCreator24, Blogger, and GitHub.
     */
    function exitApp() {
        // AppCreator24 Specific Exit
        if (window.AppCreator24 && typeof window.AppCreator24.exit === 'function') {
            window.AppCreator24.exit();
        } 
        // Chrome/Modern Browser Fallback
        else if (window.android && typeof window.android.closeApp === 'function') {
            window.android.closeApp();
        }
        else {
            try {
                // Blogger/GitHub/PWA Fallback
                window.open('', '_self', ''); 
                window.close();
                // If it's a web view and window.close() is restricted, redirect to home or blank
                if (!window.closed) {
                    window.location.href = "about:blank";
                }
            } catch(e) {
                console.log("Exit routine failed, redirecting...");
                window.location.href = "about:blank";
            }
        }
    }
</script>
</body></html>
