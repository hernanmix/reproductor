<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CanchaTV Mux Player</title>

<!-- Mux Player CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest/dist/mux-player.css" />

<style>
body {
  margin:0;
  background:#000;
  font-family:'Rubik',sans-serif;
}
mux-player {
  width:100%;
  height:100vh;
  --controls: auto;
  --media-background: #000;
}
</style>
</head>
<body>

<!-- Contenedor del reproductor -->
<mux-player id="player"
  autoplay
  stream-type="live"
  playsinline
  muted
  controls>
</mux-player>

<!-- Mux Player JS -->
<script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest/dist/mux-player.js"></script>

<script>
'use strict';

// 🔹 Detectar parámetro ?stream=
const params = new URLSearchParams(location.search);
const stream = params.get('stream') || 'espn'; // por defecto ESPN
// URL dinámica de tu proxy HLS/Mux
const SRC = `https://aw1wcm92zq.fubohd.com:443/espn/mono.m3u8?token=30df90bea1df175986b11c0eb8468e8f2b538d75-60-1775421474-1775403474${stream}`;

// Inicializar Mux Player
const player = document.getElementById('player');
player.src = SRC;
player.title = `CanchaTV - ${stream.toUpperCase()}`;
</script>
</body>
</html>
