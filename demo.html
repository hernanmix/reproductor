  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player HLS Pro</title>

<!-- JWPlayer -->
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
}

/* Contenedor estilo Netflix */
.player-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: black;
}

#player {
    width: 100%;
    height: 100%;
}

/* Overlay tipo Netflix */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    color: white;
}

/* Título */
.title {
    font-size: 22px;
    font-weight: bold;
}

/* Loader */
.loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

/* Personalización JW */
.jw-controlbar {
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent) !important;
}

.jw-button-color {
    color: #e50914 !important;
}

.jw-progress {
    background: #e50914 !important;
}
</style>

</head>
<body>

<div class="player-container">

    <div id="player"></div>

    <div class="overlay">
        <div class="title" id="title">Cargando...</div>
    </div>

    <div class="loader" id="loader">Cargando video...</div>

</div>

<script>

// 👉 URL de tu JSON
const JSON_URL = "data.json";

// Cargar JSON
fetch(JSON_URL)
.then(res => res.json())
.then(data => {

    document.getElementById("title").innerText = data.title;
    document.getElementById("loader").style.display = "none";

    jwplayer("player").setup({
        playlist: [{
            title: data.title,
            image: data.image,
            sources: data.sources
        }],

        width: "100%",
        height: "100%",
        aspectratio: "16:9",

        autostart: false,
        mute: false,
        controls: true,

        primary: "html5",
        preload: "auto",

        stretching: "uniform",

        playbackRateControls: true,

        // HLS optimizado
        hlshtml: true,
        androidhls: true,

        // Estilo
        displaytitle: false
    });

})
.catch(err => {
    document.getElementById("loader").innerText = "Error cargando JSON";
    console.error(err);
});

</script>

</body>
</html>
