<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Player PRO</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>
  body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
  }

  .player-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: black;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 🔥 quita bordes negros */
  }

  /* Barra tipo Netflix */
  .channels {
    position: absolute;
    bottom: 0;
    width: 100%;
    overflow-x: auto;
    display: flex;
    gap: 10px;
    padding: 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
  }

  .channel {
    min-width: 120px;
    cursor: pointer;
    transition: 0.3s;
  }

  .channel img {
    width: 100%;
    border-radius: 8px;
  }

  .channel:hover {
    transform: scale(1.1);
  }
</style>
</head>

<body>

<div class="player-container">
  <video id="player" playsinline controls></video>

  <div class="channels" id="channels"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
const video = document.getElementById('player');
const container = document.getElementById('channels');

const params = new URLSearchParams(window.location.search);
const currentStream = params.get('stream');

/* 🔥 M3U URL (puedes cambiarla) */
const M3U_URL = "https://hernanmix.github.io/reproductor/lista.m3u";

let channels = [];

/* 🔥 Parsear M3U */
async function loadM3U() {
  const res = await fetch(M3U_URL);
  const text = await res.text();

  const lines = text.split('\n');

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('#EXTINF')) {
      const name = lines[i].match(/,(.*)/)[1];
      const url = lines[i + 1];

      channels.push({
        name,
        url,
        logo: "https://via.placeholder.com/150x80?text=" + encodeURIComponent(name)
      });
    }
  }

  renderChannels();
  loadInitial();
}

/* 🎬 Render UI */
function renderChannels() {
  channels.slice(0, 20).forEach(ch => {
    const div = document.createElement('div');
    div.className = 'channel';

    div.innerHTML = `<img src="${ch.logo}" alt="${ch.name}">`;

    div.onclick = () => {
      window.location.search = "?stream=" + encodeURIComponent(ch.name);
    };

    container.appendChild(div);
  });
}

/* ▶️ Cargar video */
function playStream(url) {
  if (window.hls) window.hls.destroy();

  if (Hls.isSupported()) {
    const hls = new Hls();
    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(video);

  } else {
    video.src = url;
  }

  video.muted = false;

  video.play().catch(() => {
    video.muted = true;
    video.play();
  });
}

/* 🔥 Selección inicial */
function loadInitial() {
  let ch = channels.find(c => c.name === currentStream) || channels[0];
  playStream(ch.url);
}

/* 📱 FULLSCREEN auto horizontal */
video.addEventListener('enterfullscreen', () => {
  screen.orientation?.lock('landscape').catch(()=>{});
});

/* ▶️ Plyr */
const player = new Plyr(video, {
  controls: ['play','progress','current-time','mute','volume','fullscreen']
});

loadM3U();
</script>

</body>
</html>
