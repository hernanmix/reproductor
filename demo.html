<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#141414;
    font-family:Arial, sans-serif;
    color:white;
}

/* PLAYER */
#player-container {
    position:relative;
    width:100%;
    height:60vh;
    background:black;
}

video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */
.info {
    position:absolute;
    bottom:20px;
    left:20px;
}

.info h1 {
    margin:0;
    font-size:24px;
}

/* BUSCADOR */
.search {
    padding:15px;
    background:#111;
}

.search input {
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#222;
    color:white;
}

/* LISTA */
.row {
    padding:10px;
}

.row h2 {
    margin-left:10px;
}

.list {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.card {
    min-width:150px;
    cursor:pointer;
    transition:0.3s;
}

.card img {
    width:100%;
    border-radius:5px;
}

.card:hover {
    transform:scale(1.1);
}
</style>
</head>

<body>

<!-- PLAYER -->
<div id="player-container">
    <video id="video" controls></video>
    <div class="info">
        <h1 id="title">Cargando...</h1>
    </div>
</div>

<!-- BUSCADOR -->
<div class="search">
    <input type="text" id="search" placeholder="Buscar canal...">
</div>

<!-- LISTA -->
<div class="row">
    <h2>Canales</h2>
    <div class="list" id="list"></div>
</div>

<script>

let channels = [];
const video = document.getElementById("video");
let hls;

// 🔥 Cargar JSON
fetch("data.json")
.then(res => res.json())
.then(data => {
    channels = data.channels;
    render(channels);
    play(channels[0]);
});

// 🎬 Reproducir canal
function play(channel){
    document.getElementById("title").innerText = channel.title;

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){
        hls = new Hls({
            maxBufferLength: 20,
            maxMaxBufferLength: 40
        });

        hls.loadSource(channel.file);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

    } else {
        video.src = channel.file;
        video.play();
    }
}

// 📺 Render lista tipo Netflix
function render(list){
    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach(ch => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<img src="${ch.image}">`;

        div.onclick = () => play(ch);

        container.appendChild(div);
    });
}

// 🔎 Buscador
document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();

    const filtered = channels.filter(ch =>
        ch.title.toLowerCase().includes(value)
    );

    render(filtered);
});

</script>

</body>
</html>
