<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos HSPORTS EC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    .pulse-animation { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    .card-overlay { background: linear-gradient(to bottom, rgba(11,19,38,0.4), rgba(11,19,38,0.9)); }
    body { min-height: 100vh; }
  </style>
</head>
<body class="bg-[#0b1326] text-white font-[Inter]">

  <!-- Header -->
  <header class="w-full fixed top-0 z-50 bg-[#0b1326]/90 backdrop-blur-lg border-b border-[#2d3449]/50 py-4 flex justify-center items-center gap-4">
    <span class="text-2xl md:text-4xl font-black text-[#00e55b] italic tracking-[0.2em]">HSPORTSEC</span>
    <a class="flex items-center justify-center w-10 h-10 md:w-14 md:h-14 rounded-full bg-[#26A5E4] hover:scale-110 transition-transform shadow-xl shadow-[#26A5E4]/30" href="https://t.me/hsportsec" target="_blank">
      <span class="material-symbols-outlined text-white text-2xl">send</span>
    </a>
  </header>

  <!-- Contenedor de eventos -->
  <main id="events" class="pt-28 px-6 grid gap-10 md:grid-cols-2 lg:grid-cols-3">
    <!-- Aquí se insertan las tarjetas desde script.js -->
  </main>

  <!-- Reproductor oculto -->
  <div id="player-container" class="w-full max-w-4xl mx-auto mt-10 hidden">
    <video id="video" controls autoplay class="w-full rounded-lg shadow-lg"></video>
  </div>

  <!-- Footer -->
  <footer class="w-full text-center py-6 bg-[#2d3449] mt-10">
    HSPORTS EC COPYRIGHT ©️ 2026
  </footer>

  <!-- Librería HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Script externo -->
  <script src="script.js"></script>
</body>
</html>
