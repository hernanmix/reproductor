<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App HSPORTSEC</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    .logo {
      text-align: center;
      animation: glow 4s infinite;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #fff; }
      50% { text-shadow: 0 0 20px red; }
      100% { text-shadow: 0 0 5px #fff; }
    }
    .content {
  flex: 1;
  position: relative;
  height: calc(100vh - 48px); /* ocupa todo menos el menú inferior */
  overflow-y: auto;           /* ✅ permite scroll vertical */
  padding-top: 80px;          /* ✅ espacio debajo del header */
  padding-bottom: 60px;       /* ✅ espacio antes del menú inferior */
}


    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 10px;
    }

    .card {
      min-width: 260px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .img-container {
      position: relative;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      font-weight: bold;
    }

    .badge.bottom-left { bottom: 10px; left: 10px; }
    .badge.top-left { top: 10px; left: 10px; }

    .live { background: #e50914; color: #fff; }

    .icon-live {
      width: 12px;
      height: 12px;
      display: inline-block;
      vertical-align: middle;
    }

    .img-container img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    .card { overflow: hidden; border-radius: 10px; }

    .badge.upcoming {
      background-color: #1f7cab;
      color: #fff;
    }

    .bottom-menu {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    height: 48px;
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 50;
  }

  .menu-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
  }

  .menu-btn:hover { color: white; transform: scale(1.05); }
  .menu-btn .material-symbols-outlined { font-size: 26px; margin-bottom: 4px; }
  .active { color: white; border-top: 2px solid #0072FF; }

  @media (min-width: 1200px) {
    .bottom-menu { height: 85px; }
    .menu-btn .material-symbols-outlined { font-size: 34px; }
    .menu-btn { font-size: 14px; }
  }
   /* Contenedor de Ads flotante */
  .ad-container {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%; max-width: 600px;
    height: 80%; max-height: 400px;
    background: #111;
    border: 2px solid #00f;
    display: none;
    flex-direction: column;
    z-index: 1000;
  }
  .countdown {
    position: absolute;
    top: 5px; right: 10px;
    font-size: 20px;
    color: #00f;
    font-weight: bold;
  }
  .ad-container iframe {
    width: 100%; height: 100%; border: none;
  }

    .card:focus {
  outline: 2px solid #00e55b;
  transform: scale(1.05);
}

    
  </style>

</head>

<body>

<!-- Header -->
<header class="w-full fixed top-0 z-50 bg-[#0b1326]/90 backdrop-blur-lg border-b border-[#2d3449]/50 py-4 flex justify-center items-center gap-4">
  <div class="flex items-center gap-3">
    <span class="text-2xl md:text-4xl font-black text-[#00e55b] italic tracking-[0.2em]">HSP⚽RTSEC</span>
    <a class="flex items-center justify-center w-10 h-10 md:w-14 md:h-14 rounded-full bg-[#26A5E4] hover:scale-110 transition-transform shadow-xl shadow-[#26A5E4]/30" href="go:telegram" target="_blank">
      <span class="material-symbols-outlined text-white text-2xl">send</span>
    </a>
  </div>
</header>

<!-- Contenido -->
<div class="content">
  <!-- Bloque de Eventos + Canales -->
  <section id="eventsBlock">
    <h2 style="color:white; margin-left:10px;">Destacados en vivo y próximamente</h2>
    <div id="events" class="carousel"></div>

    <h2 style="color:white; margin-left:10px;">Canales de ESPN</h2>
    <div id="channels" class="carousel"></div>
  </section>

  <!-- Bloque solo de Canales -->
 <section id="channelsBlock" style="display:none;">
  <h2 style="color:white; margin-left:10px;">Todos los Canales</h2>
  <div id="channelsOnly" class="tv-grid"></div>
</section>


  <!-- Bloque de Películas -->
  <section id="moviesBlock" style="display:none;">
    <h2 style="color:white; margin-left:10px;">Películas</h2>
    <div id="movies" class="carousel"></div>
  </section>
</div>





<!-- MENÚ -->
<nav class="bottom-menu">
  <div class="menu-btn active" onclick="showEvents()">
    <span class="material-symbols-outlined">sports_soccer</span>
    Eventos
  </div>
  <div class="menu-btn" onclick="showChannels()">
    <span class="material-symbols-outlined">live_tv</span>
    Canales
  </div>
  <div class="menu-btn" onclick="showMovies()">
    <span class="material-symbols-outlined">movie</span>
    Películas
  </div>
  <div class="menu-btn" onclick="showAd()">
    <span class="material-symbols-outlined">ads_click</span>
    Ads
  </div>
  <a href="http://action_exit" class="menu-btn">
    <span class="material-symbols-outlined">logout</span>
    Salir
  </a>
</nav>

<!-- Contenedor Ads -->
<div class="ad-container" id="adContainer">
  <div class="countdown" id="adCountdown">15</div>
  <iframe id="adFrame"></iframe>
</div>

<script src="app6.js"></script>

<script>
  function showEvents() {
  document.getElementById("eventsBlock").style.display = "block";
  document.getElementById("channelsBlock").style.display = "none";
  document.getElementById("moviesBlock").style.display = "none";
  loadEvents();
  loadChannels(); // porque en eventos quieres ver ambos juntos
}

function showChannels() {
  document.getElementById("eventsBlock").style.display = "none";
  document.getElementById("moviesBlock").style.display = "none";
  document.getElementById("channelsBlock").style.display = "block";
  loadChannelsOnly(); // ✅ ahora sí carga el JSON correcto
}


function showMovies() {
  document.getElementById("eventsBlock").style.display = "none";
  document.getElementById("channelsBlock").style.display = "none";
  document.getElementById("moviesBlock").style.display = "block";
  if (typeof loadMovies === "function") loadMovies();
}


  function showAd() {
    const adContainer = document.getElementById('adContainer');
    const adFrame = document.getElementById('adFrame');
    const adCountdownEl = document.getElementById('adCountdown');
    adContainer.style.display = 'flex';
    adFrame.src = 'https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db';
    let counter = 15;
    adCountdownEl.textContent = counter;
    const timer = setInterval(() => {
      counter--;
      adCountdownEl.textContent = counter;
      if (counter <= 0) {
        clearInterval(timer);
        adContainer.style.display = 'none';
        adFrame.src = '';
      }
    }, 1000);
  }
</script>

</body>
</html>
