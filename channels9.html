<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sports Live Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#0d1321",
        "on-surface": "#dce2f5",
        "primary": "#adc7ff",
        "error": "#ffb4ab",
        "error-container": "#93000a"
      },
      fontFamily: {
        headline: ["Plus Jakarta Sans"],
        body: ["Manrope"],
        label: ["Manrope"]
      }
    }
  }
}
</script>
<style>
  body {
    background-color: #0d1321;
    margin: 0;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
    min-height: max(884px, 100dvh);
  }
  .header-gradient {
    background: linear-gradient(to bottom, rgba(13, 19, 33, 0.95) 0%, rgba(13, 19, 33, 0.6) 70%, transparent 100%);
  }
</style>
</head>
<body class="text-on-surface">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-24 header-gradient bg-[#0d1321]/80 backdrop-blur-xl">
  <div class="flex flex-col gap-1">
    <div class="flex items-center gap-4">
      <button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-blue-500/10 transition-all scale-95 active:opacity-80">
        <span class="material-symbols-outlined text-on-surface">arrow_back</span>
      </button>
      <h1 class="font-headline text-sm md:text-base font-semibold italic text-on-surface tracking-tight uppercase" id="event-title">
  Cargando evento...
</h1>
    </div>
    <div id="event-info" class="flex items-center gap-2 ml-14" style="display:none;">
  <span class="font-headline font-semibold italic text-primary tracking-tight text-sm leading-none" id="channel-name">Canal</span>
  <div class="flex items-center gap-1">
    <span class="w-1 h-1 rounded-full bg-error"></span>
    <span class="font-label text-[9px] font-semibold tracking-wide text-error uppercase">EN VIVO</span>
  </div>
</div>


    </div>
  </div>
</header>

<!-- Main Player Canvas -->
<main class="relative w-screen h-screen bg-black">
  <iframe class="embed-responsive-item" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen="" class="w-full h-full border-0" id="player-frame" src="" scrolling="no"></iframe>
  <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#0d1321] to-transparent pointer-events-none"></div>
</main>

<script>
async function updateSchedule() {
  try {
    const res = await fetch("https://hernanmix.github.io/reproductor/channels9.json"); // tu JSON externo
    const events = await res.json();

    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2, '0') + ":" +
                        now.getMinutes().toString().padStart(2, '0');

    const currentEvent = events.find(item => {
      return currentTime >= item.start && currentTime < item.end;
    });

    if (currentEvent) {
      document.getElementById('event-title').innerText = currentEvent.event;
      document.getElementById('channel-name').innerText = currentEvent.url.includes("espn") ? "ESPN" :
                                                          currentEvent.url.includes("fox") ? "FOX" : "Canal";
      document.getElementById('player-frame').src = currentEvent.url;
    } else {
      document.getElementById('event-title').innerText = "Sin evento en vivo";
      document.getElementById('channel-name').innerText = "";
      document.getElementById('player-frame').src = "";
    }
  } catch (err) {
    console.error("Error cargando channels9.json", err);
  }
}

// Ejecutar al cargar y cada minuto
updateSchedule();
setInterval(updateSchedule, 60000);
</script>

<script>
function showEventInfo() {
  const info = document.getElementById("event-info");
  info.style.display = "flex"; // mostrar

  setTimeout(() => {
    info.style.display = "none"; // ocultar después de 3 segundos
  }, 3000);
}

// Cada vez que actualices el evento desde el JSON, llama a showEventInfo()
async function updateSchedule() {
  try {
    const res = await fetch("https://hernanmix.github.io/reproductor/channels9.json");
    const events = await res.json();

    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2, '0') + ":" +
                        now.getMinutes().toString().padStart(2, '0');

    const currentEvent = events.find(item => {
      return currentTime >= item.start && currentTime < item.end;
    });

    if (currentEvent) {
      document.getElementById('event-title').innerText = currentEvent.event;
      const channelName = currentEvent.url.includes("espn") ? "ESPN" :
                          currentEvent.url.includes("fox") ? "FOX" :
                          currentEvent.url.includes("dsports") ? "DSports" : "Canal";
      document.getElementById('channel-name').innerText = channelName;
      document.getElementById('player-frame').src = currentEvent.url;

      // Mostrar info por 3 segundos
      showEventInfo();
    } else {
      document.getElementById('event-title').innerText = "Sin evento en vivo";
      document.getElementById('channel-name').innerText = "";
      document.getElementById('player-frame').src = "";
    }
  } catch (err) {
    console.error("Error cargando channels9.json", err);
  }
}

updateSchedule();
setInterval(updateSchedule, 60000);
</script>


  
</body>
</html>
