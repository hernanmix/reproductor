<style>
        body {

        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrim-gradient {
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }
        /* Grid Toggle Classes */
        .carousel-view {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        .grid-view {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        @media (min-width: 1024px) {
            .grid-view {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
        .card-carousel-width {
            flex-shrink: 0;
            width: 280px;
        }
        .card-grid-width {
            width: 100% !important;
        }
        /* Clickability and pointer handling */
        .event-card {
            display: block;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
            position: relative;
            cursor: pointer;
        }
        /* When disabled, visual feedback */
        .event-card.disabled {
            cursor: default;
            opacity: 0.8;
        }

        /**
         * Reliable Live detection across timezones.
         */
        function isEventLive(startStr, endStr) {
            const now = new Date();
            const currentTimeValue = now.getHours() * 60 + now.getMinutes();

            const [startH, startM] = startStr.split(':').map(Number);
            const startTimeValue = startH * 60 + startM;

            const [endH, endM] = endStr.split(':').map(Number);
            const endTimeValue = endH * 60 + endM;

            if (endTimeValue < startTimeValue) {
                return currentTimeValue >= startTimeValue || currentTimeValue <= endTimeValue;
            }

            return currentTimeValue >= startTimeValue && currentTimeValue <= endTimeValue;
        }

        function handleCardClick(event, url, isLive) {
            if (!isLive) {
                event.preventDefault();
                return false;
            }
            window.location.href = url;
        }

        function renderEvents() {
            const container = document.getElementById('contentContainer');
            const isGridView = container.classList.contains('grid-view');
            
            container.innerHTML = events.map(event => {
                const live = isEventLive(event.startTime, event.endTime);
                const badgeText = live ? 'VIVO' : 'PRÓXIMAMENTE';
                const badgeColor = live ? 'bg-red-600' : 'bg-blue-600';
                const cardWidthClass = isGridView ? 'card-grid-width' : 'card-carousel-width';
                const hrefAttr = live ? `href="${event.url}"` : 'href="javascript:void(0)"';
                const disabledClass = live ? '' : 'disabled';

                return `
                    <a class="event-card ${cardWidthClass} ${disabledClass} group relative" ${hrefAttr} onclick="return handleCardClick(event, '${event.url}', ${live})">
                        <div class="relative aspect-video rounded-xl overflow-hidden mb-sm ring-1 ring-white/10 ${live ? 'group-hover:ring-white/50' : ''} transition-all duration-300">
                            <img class="w-full h-full object-cover ${live ? 'group-hover:scale-105' : ''} transition-transform duration-500" alt="${event.title}" src="${event.image}"/>
                            <div class="absolute inset-0 scrim-gradient"></div>
                            <div class="absolute bottom-3 left-3 flex gap-2">
                                <span class="${badgeColor} text-white text-[10px] font-black px-2 py-0.5 rounded-sm tracking-tighter uppercase">
                                    ${badgeText}
                                </span>
                            </div>
                        </div>
                        <div class="px-1">
                            <h4 class="font-label-bold text-label-bold text-white mb-1 ${live ? 'group-hover:text-primary' : ''} transition-colors">${event.title}</h4>
                            <p class="font-label-sm text-label-sm text-slate-400">${event.startTime} - ${event.endTime} (Local)</p>
                            <p class="font-label-sm text-label-sm text-slate-500 mt-1 uppercase tracking-widest">${event.league}</p>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // View Toggling Logic
        const toggleBtn = document.getElementById('toggleView');
        const container = document.getElementById('contentContainer');
        let isGrid = false;

        toggleBtn.addEventListener('click', () => {
            isGrid = !isGrid;
            if (isGrid) {
                container.classList.remove('carousel-view');
                container.classList.add('grid-view');
                toggleBtn.innerText = 'CERRAR';
            } else {
                container.classList.add('carousel-view');
                container.classList.remove('grid-view');
                toggleBtn.innerText = 'VER TODO';
            }
            renderEvents();
        });

        // Initial render
        renderEvents();

        // Refresh dynamic states every minute
        setInterval(renderEvents, 60000);
    </script>
