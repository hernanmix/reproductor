 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">

  <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
  <script>
    jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

    function getQueryParameter(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    document.addEventListener("DOMContentLoaded", function () {
      // Tomamos todos los parámetros de la URL
      const params = new URLSearchParams(window.location.search);

      // Verificamos que exista "canal"
      if (!params.has("canal")) {
        console.error("Falta el parámetro ?canal=");
        return;
      }

      // Construimos la URL final con TODOS los parámetros
      const proxyBase = "https://canchatv.online/embedslatam/";
      const finalUrl = proxyBase + "?" + params.toString();

      const playerInstance = jwplayer("player").setup({
        playlist: [{
          sources: [{
            file: finalUrl,
            type: "hls"   // 👈 importante: HLS para .m3u8
          }]
        }],
        autostart: true,
        width: "100%",
        height: "100%",
        stretching: "uniform",
        skin: { name: "cyan" },
        logo: {
          file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg", // URL del logo
          position: "top-right",   // esquina superior derecha
          margin: 20,              // separación del borde
          link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T" // enlace al hacer clic
        }
      });

      // Al entrar en fullscreen → forzar fill (sin bordes negros)
      playerInstance.on("fullscreen", function(e) {
        if (e.fullscreen) {
          playerInstance.setConfig({ stretching: "exactfit" });
        } else {
          playerInstance.setConfig({ stretching: "uniform" });
        }
      });
    });
   
   
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #player {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
    }
    
  </style>
</head>
<body>
  <div id="player"></div>

     style="position:absolute;top:10px;right:10px;
            background:rgba(0,0,0,0.6);color:#fff;

            font-family:Arial,sans-serif;font-size:14px;z-index:9999;">

</div>

<script>
  // Al entrar
  fetch("https://hsportsec.42web.io/join.php");

  // Al salir
  window.addEventListener("beforeunload", () => {
    fetch("https://TUUSUARIO.infinityfreeapp.com/leave.php");
  });

  // Actualizar contador cada 5 segundos
  function updateViewers() {
    fetch("https://TUUSUARIO.infinityfreeapp.com/count.php")
      .then(res => res.text())
      .then(num => {
        document.getElementById("viewerOverlay").innerText = "👀 " + num + " viendo";
