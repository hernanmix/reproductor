<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">

  <!-- JWPlayer -->
  <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
  <script>
    jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

    document.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);

      if (!params.has("canal")) {
        console.error("Falta el parámetro ?canal=");
        return;
      }

      const proxyBase = "https://canchatv.online/embedslatam/";
      const finalUrl = proxyBase + "?" + params.toString();

      const playerInstance = jwplayer("player").setup({
        playlist: [{
          sources: [{
            file: finalUrl,
            type: "hls"   // 👈 importante: HLS para .m3u8
          }]
        }],
        autostart: true,
        width: "100%",
        height: "100%",
        stretching: "uniform",
        skin: { name: "cyan" },
        logo: {
          file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg", // URL del logo
          position: "top-right",                // esquina superior derecha
          margin: 20,                           // separación del borde
          link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T" // clic en logo
        },
        contextmenu: false
      });

      // Al entrar en fullscreen → forzar fill (sin bordes negros)
      playerInstance.on("fullscreen", function(e) {
        if (e.fullscreen) {
          playerInstance.setConfig({ stretching: "exactfit" });
        } else {
          playerInstance.setConfig({ stretching: "uniform" });
        }
      });
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #player {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
    }

    /* 🔹 Forzar logo siempre visible incluso en fullscreen */
    .jw-logo {
      width: 120px !important;
      height: auto !important;
      display: block !important;
      position: absolute !important;
      top: 10px !important;
      right: 10px !important;
      z-index: 99999 !important;
    }
  </style>
</head>
<body>
  <div id="player"></div>
</body>
</html>
