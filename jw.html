<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="referrer" content="no-referrer">

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
  jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

  document.addEventListener("DOMContentLoaded", function () {
    // 🔹 Tomamos todos los parámetros de la URL
    const params = new URLSearchParams(window.location.search);

    // Verificamos que exista "canal"
    if (!params.has("canal")) {
      console.error("Falta el parámetro ?canal=");
      return;
    }

    // 🔹 Construimos la URL final con TODOS los parámetros
    // Ejemplo: https://canchatv.online/embedslatam/?canal=tudn&target=3&raw=1
    const proxyBase = "https://canchatv.online/embedslatam/";
    const finalUrl = proxyBase + "?" + params.toString();

    const playerInstance = jwplayer("player").setup({
      playlist: [{
        sources: [{
          file: finalUrl,
          type: "hls"   // 👈 importante: HLS para .m3u8
        }]
      }],
      autostart: true,
      width: "100%",
      height: "100%",
      stretching: "uniform",
      skin: { name: "cyan" },
      logo: {
        file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg",
        position: "top-right",
        margin: 20,
        link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T"
      }
    });

    // 🔹 Desactivar menú contextual
      contextmenu: false
    });

    playerInstance.on("fullscreen", function(e) {
      if (e.fullscreen) {
        playerInstance.setConfig({ stretching: "exactfit" });
      } else {
        playerInstance.setConfig({ stretching: "uniform" });
      }
    });
  });
</script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
  }

  #player {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
  }

  .jw-logo {
    width: 120px !important;
    height: auto !important;
  }
</style>

<div id="player"></div>
