<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="referrer" content="no-referrer">

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
  jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

  function getQueryParameter(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  document.addEventListener("DOMContentLoaded", function () {
    // 🔹 Tomamos el parámetro ?canal= de la URL
    const streamParam = getQueryParameter("canal");

    // Si no hay parámetro, mostramos error
    if (!streamParam) {
      console.error("Falta el parámetro ?canal=");
      return;
    }

    // 🔹 Construimos la URL final para el proxy
    // Ejemplo: https://canchatv.online/embedslatam/?canal=tudn&target=3&raw=1
    const proxyBase = "https://canchatv.online/embedslatam/?canal=";
    const finalUrl = proxyBase + encodeURIComponent(streamParam);

    const playerInstance = jwplayer("player").setup({
      playlist: [{
        sources: [{
          file: finalUrl,
          type: "hls"   // 👈 importante: HLS para .m3u8
        }]
      }],
      autostart: true,
      width: "100%",
      height: "100%",
      stretching: "uniform",
      skin: { name: "cyan" }
    });

    // Al entrar en fullscreen → forzar fill (sin bordes negros)
    playerInstance.on("fullscreen", function(e) {
      if (e.fullscreen) {
        playerInstance.setConfig({ stretching: "exactfit" });
      } else {
        playerInstance.setConfig({ stretching: "uniform" });
      }
    });
  });
</script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
  }

  #player {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
  }
</style>

<div id="player"></div>
