<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sports Live Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#0d1321",
        "on-surface": "#dce2f5",
        "primary": "#adc7ff",
        "error": "#ffb4ab",
        "error-container": "#93000a"
      },
      fontFamily: {
        headline: ["Plus Jakarta Sans"],
        body: ["Manrope"],
        label: ["Manrope"]
      }
    }
  }
}
</script>
<style>
  body {
    background-color: #0d1321;
    margin: 0;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
    min-height: max(884px, 100dvh);
  }
  .header-gradient {
    background: linear-gradient(to bottom, rgba(13, 19, 33, 0.95) 0%, rgba(13, 19, 33, 0.6) 70%, transparent 100%);
  }
</style>
</head>
<body class="text-on-surface">

<!-- TopAppBar -->
<header id="event-header" class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-transparent" style="display:none; opacity:0;">
  <div class="flex flex-col gap-1">
    <div class="flex items-center gap-4">
      <button onclick="goBack()" class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-blue-500/10 transition-all scale-95 active:opacity-80">
        <span class="material-symbols-outlined text-on-surface text-sm">arrow_back</span>
      </button>
      <h1 class="font-headline text-xs md:text-sm font-semibold italic text-on-surface tracking-tight uppercase" id="event-title">
        Cargando evento...
      </h1>
    </div>
    <div class="flex items-center gap-2 ml-12">
      <span class="font-headline font-semibold italic text-primary tracking-tight text-xs leading-none" id="channel-name">Canal</span>
      <div class="flex items-center gap-1">
        <span class="w-1 h-1 rounded-full bg-error"></span>
        <span class="font-label text-[8px] font-semibold tracking-wide text-error uppercase">EN VIVO</span>
      </div>
    </div>
  </div>
</header>



<!-- Main Player Canvas -->
<main class="relative w-screen h-screen bg-black">
  <iframe id="player-frame" class="embed-responsive-item w-full h-full border-0"
          frameborder="0"
          allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
          allowfullscreen
          scrolling="no"
          src="">
  </iframe>
  <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#0d1321] to-transparent pointer-events-none"></div>
</main>

<script>
async function updateSchedule() {
  try {
    const res = await fetch("https://hernanmix.github.io/reproductor/channels9.json");
    const events = await res.json();

    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2, '0') + ":" +
                        now.getMinutes().toString().padStart(2, '0');

    const currentEvent = events.find(item => {
      return currentTime >= item.start && currentTime < item.end;
    });

    if (currentEvent) {
      document.getElementById('event-title').innerText = currentEvent.event;
      document.getElementById('channel-name').innerText = currentEvent.url.includes("espn") ? "ESPN" :
                                                          currentEvent.url.includes("fox") ? "FOX" : "Canal";
      document.getElementById('player-frame').src = currentEvent.url;
    } else {
      document.getElementById('event-title').innerText = "Sin evento en vivo";
      document.getElementById('channel-name').innerText = "";
      document.getElementById('player-frame').src = "";
    }
  } catch (err) {
    console.error("Error cargando channels9.json", err);
  }
}

// Ejecutar al cargar y cada minuto
updateSchedule();
setInterval(updateSchedule, 60000);

// Lógica de retroceso
function goBack() {
  const isWebView = navigator.userAgent.includes("wv") || navigator.userAgent.includes("AppCreator24");
  if (isWebView) {
    window.location.href = "go:exitFs"; // salir en APK
    return;
  }

  const playerFrame = document.getElementById("player-frame");
  if (playerFrame && playerFrame.src) {
    const url = playerFrame.src;
    const match = url.match(/channel=([^&]+)/);
    if (match) {
      const channelName = match[1]; // ej: espn2
      window.location.href = `https://hsports4hd.blogspot.com/p/${channelName}.html?m=1`;
      return;
    }
  }

  // Fallback → inicio general
  window.location.href = "https://hsports4hd.blogspot.com/p/universohd1.html?m=1";
}
</script>


<script>
async function updateSchedule() {
  try {
    const res = await fetch("https://hernanmix.github.io/reproductor/channels9.json");
    const events = await res.json();

    const now = new Date();

    // Buscar evento actual (duración fija de 2 horas)
    const currentEvent = events.find(item => {
      // item.start debe ser "HH:MM"
      const [h, m] = item.start.split(":").map(Number);
      const start = new Date();
      start.setHours(h, m, 0, 0);

      // Fin = inicio + 2 horas
      const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

      return now >= start && now < end;
    });

    if (currentEvent) {
      // Mostrar nombre del evento
      document.getElementById('event-title').innerText = currentEvent.event;

      // Detectar canal por URL
      const channelName = currentEvent.url.includes("espn") ? "ESPN" :
                          currentEvent.url.includes("fox") ? "FOX" :
                          currentEvent.url.includes("dsports") ? "DSports" : "Canal";
      document.getElementById('channel-name').innerText = channelName;

      const playerFrame = document.getElementById('player-frame');
      if (playerFrame.src !== currentEvent.url) {
        playerFrame.src = currentEvent.url;
      }

      showEventHeader();

      // Programar actualización automática al terminar el partido (2 horas)
      const [h, m] = currentEvent.start.split(":").map(Number);
      const start = new Date();
      start.setHours(h, m, 0, 0);
      const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

      const msUntilEnd = end.getTime() - now.getTime();
      setTimeout(updateSchedule, msUntilEnd); // actualizar justo al terminar
    } else {
      document.getElementById('event-title').innerText = "Sin evento en vivo";
      document.getElementById('channel-name').innerText = "";
      document.getElementById('player-frame').src = "";
    }
  } catch (err) {
    console.error("Error cargando channels9.json", err);
  }
}

// Ejecutar al cargar
updateSchedule();
</script>

  
  
  <script>
// Detectar toque en el reproductor interno
document.querySelector("main").addEventListener("click", () => {
  // Avisar a la página padre (plantilla externa)
  window.parent.postMessage({ action: "showEvent" }, "*");
});
</script>


</body>
</html>




<div class="flex items-center gap-2 ml-14">
  <span class="font-headline font-semibold italic text-primary tracking-tight text-sm leading-none" id="channel-name">Canal</span>
  <div class="flex items-center gap-1">
    <span class="w-1 h-1 rounded-full bg-error"></span>
    <span class="font-label text-[9px] font-semibold tracking-wide text-error uppercase">EN VIVO</span>
  </div>
</div>
