<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor HLS P2P</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔹 llena pantalla sin márgenes negros */
    }
  </style>
</head>
<body>
  <video id="player" controls autoplay playsinline></video>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- P2P Engine -->
  <script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>

  <script>
    // 🔹 Obtener parámetro ?stream=URL
    function getStreamUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("stream");
    }

    const streamUrl = getStreamUrl() || "https://anvtcax.fubohd.com:443/ecdf_ligapro/mono.m3u8?token=f45c7a2774c07e1fb0bf55fe29d1c02ee77a8e9e-21-1775536051-1775518051";
    const video = document.getElementById("player");

    if (Hls.isSupported()) {
      const hls = new Hls();
      // 🔹 Integrar P2P
      new P2PEngineHls({
        hlsjsInstance: hls,
        live: true,
        getStats: function (p2pDown, p2pUp, httpDown) {
          console.log(`P2P ratio: ${Math.round(p2pDown/(httpDown+p2pDown)*100)}%`);
        }
      });
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      // 🔹 Soporte nativo en iOS/Safari
      video.src = streamUrl;
      video.addEventListener("loadedmetadata", () => {
        video.play();
      });
    }

    // 🔹 Pantalla completa automática en horizontal
    function goFullscreen() {
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }
    video.addEventListener("play", goFullscreen);
  </script>
</body>
</html>
