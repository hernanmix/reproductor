<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor P2P Mux</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
    }
    mux-player {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔹 llena pantalla sin márgenes negros */
    }
  </style>
</head>
<body>
  <!-- P2PEngine -->
  <script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>
  <!-- Mux Player -->
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player"></script>

  <!-- Reproductor -->
  <mux-player id="player" autoplay playsinline></mux-player>

  <p id="info" style="color:white;text-align:center;"></p>

  <script>
    async function initPlayer() {
      // 🔹 Cargar JSON de canales
      const response = await fetch("hernanmix.github.io/reproductor/channels2.json");
      const channels = await response.json();

      // 🔹 Obtener parámetro ?stream=nombre
      const params = new URLSearchParams(window.location.search);
      const channelKey = params.get("stream");
      const streamUrl = channels[channelKey] || channels["espn"]; // fallback

      const muxPlayer = document.getElementById("player");
      muxPlayer.src = streamUrl;

      // 🔹 Configuración P2P
      const p2pConfig = {
        live: true,
        getStats: function (p2pDown, p2pUp, httpDown) {
          const total = httpDown + p2pDown;
          document.querySelector('#info').innerText =
            `P2P ratio: ${Math.round(p2pDown/total*100)}%, saved: ${p2pDown}KB, uploaded: ${p2pUp}KB`;
        }
      };

      muxPlayer.addEventListener("loadstart", function () {
        if (P2PEngineHls.isSupported() && muxPlayer._hls) {
          new P2PEngineHls({
            hlsjsInstance: muxPlayer._hls,
            ...p2pConfig
          });
        }
      });

      if (!P2PEngineHls.isSupported()) {
        new P2pEngineHls.ServiceWorkerEngine(p2pConfig);
      }

      P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
        muxPlayer.play();
      });

      // 🔹 Forzar pantalla completa horizontal
      muxPlayer.addEventListener("play", async () => {
        if (muxPlayer.requestFullscreen) {
          await muxPlayer.requestFullscreen();
          if (screen.orientation && screen.orientation.lock) {
            try {
              await screen.orientation.lock("landscape");
            } catch (e) {
              console.log("No se pudo forzar landscape:", e);
            }
          }
        } else if (muxPlayer.webkitEnterFullscreen) {
          muxPlayer.webkitEnterFullscreen();
        }
      });
    }

    initPlayer();
  </script>
</body>
</html>
