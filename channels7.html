<script>
        // --- Core Application Logic ---

        // 1. Fetch upcoming events and inject into Top Bar
        async function fetchUpcomingEvents() {
            const eventContainer = document.getElementById('event-list');
            try {
                const response = await fetch('https://hernanmix.github.io/reproductor/apk.json');
                const data = await response.json();
                
                if (data && data.events) {
                    eventContainer.innerHTML = ''; // Clear loader
                    
                    data.events.forEach(event => {
                        // Formatting Start Time (assuming ISO or similar string)
                        const startTime = new Date(event.start);
                        const formattedTime = startTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

                        const eventCard = document.createElement('a');
                        eventCard.href = event.url;
                        eventCard.className = "group relative flex-shrink-0 w-32 aspect-video rounded-xl overflow-hidden bg-surface-container-high transition-all hover:ring-2 hover:ring-primary/50 hover:scale-105 active:scale-95";
                        
                        eventCard.innerHTML = `
                            <img src="${event.img}" alt="" data-alt="action sports moment photography with focus on athletes" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                            <div class="absolute bottom-1.5 left-1.5 px-2 py-0.5 rounded-lg bg-primary text-on-primary-fixed text-[10px] font-headline font-black tracking-tighter">
                                ${formattedTime}
                            </div>
                        `;
                        eventContainer.appendChild(eventCard);
                    });
                }
            } catch (error) {
                console.error('Error fetching events:', error);
                eventContainer.innerHTML = '<span class="text-on-surface-variant text-xs font-headline">Live Feed Unavailable</span>';
            }
        }

        // 2. Handle Stream Logic based on URL Parameter
        async function initializeStream() {
            const videoElement = document.getElementById('main-video');
            const urlParams = new URLSearchParams(window.location.search);
            const channelId = urlParams.get('channel');

            if (!channelId) {
                // Fallback or placeholder
                return;
            }

            try {
                const response = await fetch('https://hernanmix.github.io/reproductor/channels3.json');
                const channels = await response.json();
                
                // Assuming JSON is an array of channel objects { id, url, ... }
                const activeChannel = channels.find(c => c.id == channelId || c.name == channelId);
                
                if (activeChannel && activeChannel.url) {
                    videoElement.src = activeChannel.url;
                    videoElement.load();
                }
            } catch (error) {
                console.error('Error loading stream config:', error);
            }
        }

        // 3. Simple UI Interactions
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const mainVideo = document.getElementById('main-video');

        playPauseBtn.addEventListener('click', () => {
            if (mainVideo.paused) {
                mainVideo.play();
                playIcon.innerText = 'pause';
            } else {
                mainVideo.pause();
                playIcon.innerText = 'play_arrow';
            }
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            fetchUpcomingEvents();
            initializeStream();
        });
    </script>
