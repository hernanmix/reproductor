<!DOCTYPE html>
<html>
<head>
    <title>Reproductor de video HLS</title>
    <style>
        body {
            margin: 0;
            background: black;
        }
        #videoPlayer {
            position: fixed;   /* 🔹 lo fija en pantalla */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: black;
            object-fit: contain; /* modo normal */
            z-index: 9999; /* asegura que quede encima de otros elementos */
        }
        
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
</head>
<body>
    <video id="videoPlayer" controls></video>
    <script>
        function initPlayer() {
            var video = document.getElementById('videoPlayer');

            // Obtener parámetro ?stream=...
            var params = new URLSearchParams(window.location.search);
            var stream = params.get("stream") || "espn";

            // Construir URL dinámica
            var videoUrl = "https://canchatv.online/tvtvhd/proxy3.php?stream=" + stream;

            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoUrl;
                video.addEventListener('loadedmetadata', function () {
                    video.play();
                });
            }

            // Ajuste visual en fullscreen → llenar pantalla sin bordes negros
            document.addEventListener("fullscreenchange", () => {
                if (document.fullscreenElement) {
                    video.style.objectFit = "fill";   // estira para ocupar todo
                    video.style.width = "100vw";
                    video.style.height = "100vh";
                } else {
                    video.style.objectFit = "contain"; // vuelve al modo normal
                    video.style.width = "100%";
                    video.style.height = "100vh";
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
