<!DOCTYPE html>
<html>
<head>
    <title>Reproductor de video HLS</title>
    <style>
        body {
            margin: 0;
            background: black;
        }
        #videoPlayer {
            width: 100%;
            height: auto;
            background: black;
        }
        /* Forzar que en fullscreen ocupe todo el viewport */
        :fullscreen #videoPlayer,
        :-webkit-full-screen #videoPlayer,
        :-moz-full-screen #videoPlayer {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: fill !important; /* estira el video para eliminar márgenes negros */
            background: black;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <video id="videoPlayer" controls></video>
    <script>
        var video = document.getElementById('videoPlayer');

        // Obtener parámetro ?stream=...
        var params = new URLSearchParams(window.location.search);
        var stream = params.get("stream") || "espn";

        // Construir URL dinámica
        var videoUrl = "https://canchatv.online/tvtvhd/proxy3.php?stream=" + stream;

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
