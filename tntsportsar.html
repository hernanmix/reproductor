/* ── Toast ── */
const toast = document.getElementById('toast');
function showToast(msg, ms=2500) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), ms);
}

/* ══════════════════════════════════════════════════════
   unmuteGradual
   Igual que el proxy de referencia:
   video arranca muted → play() garantizado → subimos
   volumen de 0 a 1 en 800 ms con setInterval.
══════════════════════════════════════════════════════ */
function unmuteGradual() {
  if (!video.muted && video.volume >= 1) return;
  video.muted  = false;
  video.volume = 0;
  iconVol.style.display  = '';
  iconMute.style.display = 'none';
  volRange.value = 0;
  const steps = 20, inc = 1 / steps;
  let v = 0;
  const t = setInterval(() => {
    v = Math.min(1, v + inc);
    video.volume   = v;
    volRange.value = v;
    if (v >= 1) clearInterval(t);
  }, 800 / steps);
}

/* ── Botón grande (fallback si el navegador bloquea play()) ── */
function showPlayBtn() {
  spinner.classList.add('hidden');
  if (document.getElementById('big-play')) return;
  const btn = document.createElement('button');
  btn.id = 'big-play';
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="72" height="72" fill="white"><path d="M8 5v14l11-7z"/></svg>';
  btn.style.cssText = 'position:fixed;inset:0;margin:auto;width:100px;height:100px;background:rgba(0,230,118,.2);border:3px solid rgba(0,230,118,.6);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:500;';
  btn.addEventListener('click', () => {
    video.play().then(() => { unmuteGradual(); btn.remove(); }).catch(() => {});
  });
  document.body.appendChild(btn);
}

/* ── HLS ── */
function initHls() {
  if (Hls.isSupported()) {
    const hls = new Hls({enableWorker:true, lowLatencyMode:true, maxBufferLength:30});
    hls.loadSource(SRC);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      spinner.classList.add('hidden');
      errMsg.style.display = 'none';
      video.play()
        .then(() => unmuteGradual())   // ← sube volumen gradualmente
        .catch(() => showPlayBtn());   // ← fallback: botón grande
    });
    hls.on(Hls.Events.BUFFER_APPENDED, () => spinner.classList.add('hidden'));
    hls.on(Hls.Events.ERROR, (_e, d) => {
      if (d.fatal) {
        errMsg.textContent = '⚠️ Error al cargar. Reintentando…';
        errMsg.style.display = 'block';
        setTimeout(() => {
          errMsg.style.display = 'none';
          hls.loadSource(SRC);
          hls.attachMedia(video);
        }, 4000);
      }
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari / iOS
    video.src = SRC;
    video.addEventListener('loadedmetadata', () => {
      spinner.classList.add('hidden');
      video.play()
        .then(() => unmuteGradual())
        .catch(() => showPlayBtn());
    }, { once: true });

  } else {
    spinner.classList.add('hidden');
    errMsg.textContent = '⚠️ Tu navegador no soporta HLS.';
    errMsg.style.display = 'block';
  }
}

setTimeout(initHls, 3000);
document.getElementById('intro').addEventListener('animationend', function() { this.remove(); }, { once: true });

/* ── Play/Pause ── */
const btnPlay  = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause= document.getElementById('icon-pause');
btnPlay.addEventListener('click', () => {
  if (video.paused) video.play().then(() => unmuteGradual()).catch(() => {});
  else video.pause();
});
video.addEventListener('play',    () => { iconPlay.style.display='none'; iconPause.style.display=''; });
video.addEventListener('pause',   () => { iconPlay.style.display=''; iconPause.style.display='none'; });
video.addEventListener('waiting', () => spinner.classList.remove('hidden'));
video.addEventListener('playing', () => { spinner.classList.add('hidden'); errMsg.style.display='none'; });

/* ── Seekbar ── */
const seekbar  = document.getElementById('seekbar');
const seekBar  = document.getElementById('seekbar-bar');
const seekBuf  = document.getElementById('seekbar-buf');
const seekThumb= document.getElementById('seekbar-thumb');
video.addEventListener('timeupdate', () => {
  if (!isFinite(video.duration) || !video.duration) return;
  const p = video.currentTime / video.duration * 100;
  seekBar.style.width = p + '%'; seekThumb.style.left = p + '%';
});
video.addEventListener('progress', () => {
  if (video.buffered.length && isFinite(video.duration))
    seekBuf.style.width = (video.buffered.end(video.buffered.length-1) / video.duration * 100) + '%';
});
let seeking = false;
function doSeek(e) {
  if (!isFinite(video.duration)) return;
  const r = seekbar.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * video.duration;
}
seekbar.addEventListener('mousedown', e => { seeking=true; doSeek(e); });
document.addEventListener('mousemove', e => { if(seeking) doSeek(e); });
document.addEventListener('mouseup', () => { seeking=false; });
seekbar.addEventListener('touchstart', e => { e.preventDefault(); doSeek(e.touches[0]); });
seekbar.addEventListener('touchmove',  e => { e.preventDefault(); doSeek(e.touches[0]); });

document.getElementById('btn-rew').addEventListener('click', () => { if(isFinite(video.duration)) video.currentTime = Math.max(0, video.currentTime-10); });
document.getElementById('btn-fwd').addEventListener('click', () => { if(isFinite(video.duration)) video.currentTime = Math.min(video.duration, video.currentTime+10); });

/* ── Volumen ── */
document.getElementById('btn-mute').addEventListener('click', () => {
  video.muted = !video.muted;
  iconVol.style.display  = video.muted ? 'none' : '';
  iconMute.style.display = video.muted ? '' : 'none';
  volRange.value = video.muted ? 0 : video.volume;
});
volRange.addEventListener('input', () => {
  video.volume = +volRange.value;
  if (video.muted && +volRange.value > 0) {
    video.muted = false;
    iconVol.style.display  = '';
    iconMute.style.display = 'none';
  }
});

/* ── Fullscreen ── */
const btnFs    = document.getElementById('btn-fs');
const iconFsOn = document.getElementById('icon-fs-on');
const iconFsOff= document.getElementById('icon-fs-off');
btnFs.addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement)
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
  else
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
});
['fullscreenchange','webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    iconFsOn.style.display  = fs ? 'none' : '';
    iconFsOff.style.display = fs ? '' : 'none';
  })
);

/* ── Double-tap seek (móvil) ── */
let lastTap = 0;
video.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
    const x = e.changedTouches[0].clientX;
    if (x < window.innerWidth/2) { if(isFinite(video.duration)) video.currentTime = Math.max(0, video.currentTime-10); }
    else                          { if(isFinite(video.duration)) video.currentTime = Math.min(video.duration, video.currentTime+10); }
  }
  lastTap = now;
});
video.addEventListener('click', showUI);

/* ── UI auto-hide ── */
let hideTimer;
function showUI() {
  topbar.classList.remove('hide'); controls.classList.remove('hide');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => { if (!video.paused) { topbar.classList.add('hide'); controls.classList.add('hide'); } }, 3500);
}
document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI, { passive: true });
video.addEventListener('pause', () => { topbar.classList.remove('hide'); controls.classList.remove('hide'); clearTimeout(hideTimer); });
video.addEventListener('play',  () => { hideTimer = setTimeout(() => { topbar.classList.add('hide'); controls.classList.add('hide'); }, 3500); });
showUI();

/* ── Share modal ── */
const shareModal = document.getElementById('share-modal');
document.getElementById('btn-share').addEventListener('click', () => { shareModal.classList.add('open'); showUI(); });
document.getElementById('share-close').addEventListener('click', () => shareModal.classList.remove('open'));
shareModal.addEventListener('click', e => { if(e.target===shareModal) shareModal.classList.remove('open'); });
document.querySelectorAll('.share-copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.target);
    navigator.clipboard.writeText(inp.value).then(() => {
      const o = btn.textContent; btn.textContent = '✓ Copiado'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 2000);
    }).catch(() => { inp.select(); document.execCommand('copy'); });
  });
});

/* ── AirPlay ── */
const btnAirPlay = document.getElementById('btn-airplay');
if (window.WebKitPlaybackTargetAvailabilityEvent) {
  video.addEventListener('webkitplaybacktargetavailabilitychanged', (e) => {
    btnAirPlay.classList.toggle('btn-hidden', e.availability !== 'available');
  });
  btnAirPlay.addEventListener('click', () => { video.webkitShowPlaybackTargetPicker(); });
  video.addEventListener('webkitcurrentplaybacktargetiswirelesschanged', () => {
    const wireless = video.webkitCurrentPlaybackTargetIsWireless;
    btnAirPlay.style.color = wireless ? 'var(--green)' : '';
    if (wireless) showToast('📡 Transmitiendo por AirPlay');
  });
}

/* ── Google Cast ── */
const btnCast     = document.getElementById('btn-cast');
const castOverlay = document.getElementById('cast-overlay');
const castDevName = document.getElementById('cast-device-name');

function initCast() {
  try {
    const context = cast.framework.CastContext.getInstance();
    context.setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
    });
    btnCast.classList.remove('btn-hidden');
    context.addEventListener(cast.framework.CastContextEventType.CAST_STATE_CHANGED, (e) => {
      const state = e.castState;
      const CS = cast.framework.CastState;
      if (state === CS.CONNECTED) {
        btnCast.classList.add('cast-active');
        const session = context.getCurrentSession();
        const deviceName = session ? session.getCastDevice().friendlyName : 'TV';
        castDevName.textContent = deviceName;
        castOverlay.classList.add('active');
        showToast('📺 Conectado a ' + deviceName);
        loadMediaOnCast(context);
      } else {
        btnCast.classList.remove('cast-active');
        castOverlay.classList.remove('active');
        if (state === CS.NOT_CONNECTED) video.play().catch(() => {});
      }
    });
    btnCast.addEventListener('click', async () => {
      const state = context.getCastState();
      const CS = cast.framework.CastState;
      if (state === CS.NOT_CONNECTED || state === CS.NO_DEVICES_AVAILABLE) {
        try { await context.requestSession(); }
        catch(e) { if (e.code !== 'CANCEL') showToast('No se pudo conectar al dispositivo'); }
      } else {
        context.endCurrentSession(true);
      }
    });
  } catch(e) { console.warn('Cast init error:', e); }
}

function loadMediaOnCast(context) {
  try {
    const session = context.getCurrentSession();
    if (!session) return;
    const mediaInfo = new chrome.cast.media.MediaInfo(SRC, 'application/x-mpegURL');
    mediaInfo.streamType = chrome.cast.media.StreamType.LIVE;
    mediaInfo.metadata   = new chrome.cast.media.TvShowMediaMetadata();
    mediaInfo.metadata.title = TITLE;
    const request = new chrome.cast.media.LoadRequest(mediaInfo);
    session.loadMedia(request).then(
      () => { video.pause(); },
      (err) => { showToast('Error al enviar a Cast: ' + err); }
    );
  } catch(e) { console.warn('Cast loadMedia error:', e); }
}
