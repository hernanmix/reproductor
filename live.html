<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor HLS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill; /* 🔹 ocupa toda la pantalla sin márgenes negros */
      background: #000;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <video id="videoPlayer" controls autoplay playsinline></video>

  <script>
    async function initPlayer() {
      // 🔹 Cargar JSON de canales desde GitHub
      const response = await fetch("https://hernanmix.github.io/reproductor/channels2.json");
      const channels = await response.json();

      // 🔹 Obtener parámetro ?stream=nombre
      const params = new URLSearchParams(window.location.search);
      const channelKey = params.get("stream");
      const streamUrl = channels[channelKey];

      if (!streamUrl) {
        alert("Canal no encontrado en channels2.json");
        return;
      }

      const video = document.getElementById("videoPlayer");

      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        // 🔹 Soporte nativo en Safari/iOS
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", function () {
          video.play();
        });
      }

      // 🔹 Forzar fullscreen horizontal al reproducir
      video.addEventListener("play", async () => {
        if (video.requestFullscreen) {
          await video.requestFullscreen();
          if (screen.orientation && screen.orientation.lock) {
            try {
              await screen.orientation.lock("landscape");
            } catch (err) {
              console.log("No se pudo forzar landscape:", err);
            }
          }
        } else if (video.webkitEnterFullscreen) {
          video.webkitEnterFullscreen();
        }
      });
    }

    initPlayer();
  </script>
</body>
</html>
