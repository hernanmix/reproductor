
<!DOCTYPE html>
<html>
<head>
    <title>Reproductor de video HLS</title>
    <style>
        body {
            margin: 0;
        }

        #videoPlayer {
            width: 100%;
            height: auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <video id="videoPlayer" controls></video>
    <script>
        var video = document.getElementById('videoPlayer');
        var videoUrl = 'https://streametx.app/php/proxy_magma.php?r=/proxy&url=http%3A%2F%2Ftv.m3uts.xyz%2Fstream%2Fsecure%2FAmH5KmRmZy8kZQphZGtkYwV0ZP4mAS8kAmp1ZGHlZGR5KmtmLmHkAGH0ZTZkZTLlAJSsZN%2F132.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
