<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
}

/* PLAYER */
#player-container {
    position:relative;
    width:100%;
    height:60vh;
    background:black;
}

video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */
.overlay {
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    pointer-events:none;
}

/* TITULO */
.title {
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:22px;
}

/* BUSCADOR */
.search {
    padding:10px;
    background:#111;
}

.search input {
    width:100%;
    padding:10px;
    border:none;
    background:#222;
    color:white;
    border-radius:5px;
}

/* LISTA */
.row {
    padding:10px;
}

.list {
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.card {
    min-width:140px;
    cursor:pointer;
    transition:0.3s;
}

.card img {
    width:100%;
    border-radius:5px;
}

.card:hover {
    transform:scale(1.1);
}

/* FAVORITOS */
.fav {
    position:absolute;
    top:10px;
    right:10px;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="player-container">
    <video id="video" controls autoplay muted></video>
    <div class="overlay"></div>
    <div class="title" id="title">Cargando...</div>
    <div class="fav" onclick="toggleFav()">⭐</div>
</div>

<div class="search">
    <input type="text" id="search" placeholder="Buscar canal...">
</div>

<div class="row">
    <h2>Canales</h2>
    <div class="list" id="list"></div>
</div>

<script>

let channels = [];
let currentIndex = 0;
let hls;
const video = document.getElementById("video");

// 🔥 Cargar JSON
fetch("data.json")
.then(r => r.json())
.then(data => {
    channels = data.channels;
    render(channels);
    play(0);
});

// 🎬 reproducir
function play(index){

    currentIndex = index;
    const ch = channels[index];

    document.getElementById("title").innerText = ch.title;

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){
        hls = new Hls({
            lowLatencyMode:true,
            maxBufferLength:20
        });

        hls.loadSource(ch.file);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

        // 🔁 reconexión automática
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                setTimeout(() => play(currentIndex), 2000);
            }
        });

    } else {
        video.src = ch.file;
        video.play();
    }
}

// 📺 render lista
function render(list){
    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach((ch, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${ch.image}">
        `;

        div.onclick = () => play(i);

        container.appendChild(div);
    });
}

// 🔎 buscador
document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();

    const filtered = channels.filter(ch =>
        ch.title.toLowerCase().includes(value)
    );

    render(filtered);
});

// ⭐ favoritos
function toggleFav(){
    let favs = JSON.parse(localStorage.getItem("favs") || "[]");

    if(favs.includes(currentIndex)){
        favs = favs.filter(f => f !== currentIndex);
    } else {
        favs.push(currentIndex);
    }

    localStorage.setItem("favs", JSON.stringify(favs));
    alert("Favorito actualizado ⭐");
}

</script>

</body>
</html>
