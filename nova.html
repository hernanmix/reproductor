<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HSPORTS HD</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
}

video{
  width:100%;
  height:100vh;
  object-fit:contain;
  background:black;
}

#spinner{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

#title{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<video id="video" autoplay muted controls></video>
<div id="spinner">Cargando...</div>
<div id="title">Cargando...</div>

<script>

const video = document.getElementById("video");
const spinner = document.getElementById("spinner");
const title = document.getElementById("title");

// 🔥 CAMBIA AQUÍ TU STREAM
const SRC = "http://live.adultiptv.net/milf.m3u8";
const NAME = "Adultoxx";

title.innerText = NAME;

// 🎬 reproducir
function start(){

  if(Hls.isSupported()){
    const hls = new Hls({
      lowLatencyMode:true,
      maxBufferLength:30
    });

    hls.loadSource(SRC);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      spinner.style.display = "none";
      video.play();
    });

    // 🔁 auto reconexión
    hls.on(Hls.Events.ERROR, (e,data)=>{
      if(data.fatal){
        setTimeout(start,2000);
      }
    });

  } else {
    video.src = SRC;
    video.play();
  }
}

start();

</script>

</body>
</html>
