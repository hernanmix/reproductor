<style>
/* ── Telegram Popup ── */
#tg-popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:500;background:#17212b;border:1px solid rgba(42,171,238,.35);border-radius:16px;padding:.85rem 1.1rem;display:flex;align-items:center;gap:.85rem;box-shadow:0 8px 32px rgba(0,0,0,.55);animation:tgSlideIn .45s cubic-bezier(.34,1.56,.64,1) 3s both;max-width:320px;width:calc(100% - 2rem);}
@keyframes tgSlideIn{from{transform:translateX(-50%) translateY(30px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#tg-popup.hide{animation:tgSlideOut .3s ease forwards;}

.tg-icon{flex-shrink:0;width:42px;height:42px;background:#2aabee;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.tg-icon svg{width:24px;height:24px;fill:#fff;}
.tg-text{flex:1;min-width:0;}
.tg-text strong{display:block;color:#fff;font-size:.82rem;font-weight:700;margin-bottom:.15rem;}
.tg-text span{color:rgba(255,255,255,.5);font-size:.72rem;}
.tg-join{flex-shrink:0;background:#2aabee;color:#fff;border:none;border-radius:20px;padding:.4rem .9rem;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:'Rubik',sans-serif;transition:background .2s;white-space:nowrap;}
.tg-join:hover{background:#1d96d8;}
#tg-close{flex-shrink:0;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:background .2s;margin-left:-.3rem;user-select:none;-webkit-user-select:none;}
#tg-close:hover{background:rgba(255,255,255,.2);color:#fff;}
:root{--green:#00e676;--green2:#00c853;--green-dim:rgba(0,230,118,.15);--green-glow:rgba(0,230,118,.35);--bg:#050a07;--bg2:#0a1410;--ctrl-h:56px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;}
body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Rubik',sans-serif;touch-action:none;}
#intro{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1f10 0%,#020806 70%);animation:introFadeOut .5s ease 2.2s both;}
@keyframes introFadeOut{to{opacity:0;pointer-events:none;}}
#intro::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,230,118,.08) 0%,transparent 70%);pointer-events:none;}
.pitch{position:relative;width:180px;height:120px;border:2px solid rgba(0,230,118,.5);border-radius:4px;margin-bottom:1.8rem;animation:pitchPop .6s cubic-bezier(.34,1.56,.64,1) .2s both;}
@keyframes pitchPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.pitch::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:rgba(0,230,118,.4);}
.pitch::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border:2px solid rgba(0,230,118,.4);border-radius:50%;}
.pitch-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--green);border-radius:50%;}
.penalty{position:absolute;width:54px;height:30px;border:2px solid rgba(0,230,118,.35);}
.penalty-l{top:50%;left:-2px;transform:translateY(-50%);border-left:none;}
.penalty-r{top:50%;right:-2px;transform:translateY(-50%);border-right:none;}
.ball{position:absolute;width:22px;height:22px;top:50%;left:50%;transform:translate(-50%,-50%);animation:ballKick .7s cubic-bezier(.22,1,.36,1) .9s both;font-size:1.3rem;line-height:22px;text-align:center;}

.intro-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.1em;color:#fff;animation:logoIn .5s ease .5s both;}
.intro-logo span{color:var(--green);}

.intro-channel{margin-top:.4rem;font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;animation:logoIn .5s ease .8s both;}
.intro-dots{margin-top:1.4rem;display:flex;gap:.5rem;animation:logoIn .4s ease 1.2s both;}
.intro-dots span{width:6px;height:6px;background:var(--green);border-radius:50%;animation:dot .9s ease-in-out infinite;}
.intro-dots span:nth-child(2){animation-delay:.15s;}

#topbar.hide{opacity:0;pointer-events:none;}
.tb-back{font-size:.75rem;color:rgba(255,255,255,.6);text-decoration:none;font-weight:500;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);padding:.28rem .75rem;border-radius:20px;transition:all .2s;white-space:nowrap;}
.tb-back:hover{background:var(--green-dim);color:var(--green);border-color:var(--green);}

#quality-badge{font-size:.6rem;font-weight:700;letter-spacing:.06em;background:rgba(0,0,0,.5);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1);padding:.15rem .4rem;border-radius:3px;position:fixed;top:54px;right:.8rem;z-index:201;transition:opacity .4s;}

video{width:100%;height:100%;object-fit:contain;display:block;}

#controls{position:fixed;bottom:0;left:0;right:0;padding-bottom:max(.5rem,env(safe-area-inset-bottom));padding-left:max(.8rem,env(safe-area-inset-left));padding-right:max(.8rem,env(safe-area-inset-right));background:linear-gradient(to top,rgba(2,8,4,.95) 50%,transparent);z-index:100;transition:opacity .4s;}

#seekbar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;margin-bottom:.5rem;position:relative;transition:height .15s;}

#seekbar-bar{position:absolute;inset:0;background:var(--green);border-radius:2px;width:0;}

.ctrl-btn:hover,.ctrl-btn:active{color:var(--green);background:rgba(0,230,118,.06);}
.ctrl-btn svg{width:22px;height:22px;fill:currentColor;pointer-events:none;display:block;}

.live-dot-small{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse .9s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ctrl-spacer{flex:1;}
#vol-wrap{display:flex;align-items:center;gap:4px;}
#vol-range{-webkit-appearance:none;appearance:none;width:60px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);cursor:pointer;outline:none;}
#vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--green);border-radius:50%;cursor:pointer;}
#vol-range::-moz-range-thumb{width:11px;height:11px;background:var(--green);border-radius:50%;border:none;cursor:pointer;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(10,20,12,.95);border:1px solid rgba(0,230,118,.3);color:#fff;font-size:.8rem;padding:.5rem 1.1rem;border-radius:20px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#share-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
#share-modal.open{display:flex;}
.share-box{background:var(--bg2);border:1px solid rgba(0,230,118,.15);border-radius:20px 20px 0 0;padding:1.4rem;width:100%;max-width:480px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.share-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.share-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#fff;letter-spacing:.06em;}
.share-close{background:rgba(255,255,255,.07);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s;}
.share-close:hover{background:rgba(0,230,118,.2);color:var(--green);}
.share-field{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;margin-bottom:.75rem;}
.share-field label{display:block;font-size:.65rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;padding:.55rem .8rem .2rem;font-weight:500;}
.share-field-row{display:flex;align-items:stretch;}
.share-input{flex:1;background:none;border:none;color:rgba(255,255,255,.7);font-family:monospace;font-size:.72rem;padding:.35rem .8rem .6rem;outline:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.share-copy{background:rgba(0,230,118,.12);border:none;border-left:1px solid rgba(255,255,255,.06);color:var(--green);font-size:.72rem;font-weight:600;padding:0 .85rem;cursor:pointer;transition:background .2s;white-space:nowrap;font-family:'Rubik',sans-serif;}
.share-copy:hover{background:rgba(0,230,118,.25);}
.share-copy.copied{background:rgba(0,230,118,.3);color:#fff;}
.share-btn-full{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.75rem;background:var(--green);color:#000;font-weight:700;font-size:.88rem;border:none;border-radius:10px;cursor:pointer;text-decoration:none;font-family:'Rubik',sans-serif;transition:background .2s;margin-top:.2rem;}

<body>

<!-- Intro animado -->
<div id="intro">

<div id="cast-overlay">
  <div class="cast-icon">📺</div>

</div>

<!-- Video -->
<div id="video-wrap">
  <video id="video" playsinline autoplay muted
         x-webkit-airplay="allow"
         webkit-playsinline="true"
         airplay="allow"></video>
</div>
<div id="spinner"><div class="spin-ring"></div></div>
<div id="error-msg"></div>
<div id="toast"></div>
<div id="quality-badge">AUTO</div>

<!-- Topbar -->
<div id="topbar">
  <a href="/" class="tb-logo">Cancha<span>TV</span></a>

<!-- Controles -->
<div id="controls">
  <!-- Aquí va todo el bloque de controles que me diste en la parte 3 -->
</div>

<!-- Modal compartir -->
<div id="share-modal">
  <div class="share-box">
    <div class="share-header">
      <div class="share-title">Compartir canal</div>
      <button class="share-close" id="share-close">✕</button>
    </div>
    <div class="share-field">
      <label>🔗 Link directo</label>
      <div class="share-field-row">
        <input class="share-input" id="share-link" readonly>
        <button class="share-copy" data-target="share-link">Copiar</button>
      </div>
    </div>
    <div class="share-field">
      <label>📺 Código iframe (embed)</label>
      <div class="share-field-row">
        <input class="share-input" id="share-iframe" readonly>
        <button class="share-copy" data-target="share-iframe">Copiar</button>
      </div>
    </div>
    <a id="share-full" target="_blank" class="share-btn-full">Abrir en pantalla completa</a>

<script>
'use strict';

// 🔹 Detectar parámetro ?stream= en la URL
const params = new URLSearchParams(location.search);
const stream = params.get('stream') || 'espn'; // por defecto ESPN
const SRC    = `https://canchatv.online/tvtvhd/proxy3.php?stream=${stream}`;
const TITLE  = `CanchaTV - ${stream.toUpperCase()}`;
document.getElementById('channel-name').textContent = stream.toUpperCase();

// Actualizar campos de compartir dinámicamente
document.getElementById('share-link').value   = SRC;
document.getElementById('share-iframe').value = `<iframe src="${SRC}" width="100%" height="100%" allowfullscreen allow="autoplay; fullscreen" style="border:none;aspect-ratio:16/9;"></iframe>`;
document.getElementById('share-full').href    = SRC;

initHls();

setInterval(() => {
  if (video.paused || video.ended || !hls) return;
  if (video.buffered.length) {
    const edge = video.buffered.end(video.buffered.length - 1);
    if (edge - video.currentTime > 20) {
      video.currentTime = edge - 1.5;
      showToast('⚡ Sincronizando con el directo…');
    }
  }
  if (video.readyState === 2) video.currentTime += 0.1;
}, 10_000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden || !video.paused) return;
  if (video.buffered.length) video.currentTime = video.buffered.end(video.buffered.length - 1) - 0.5;
  video.play().catch(() => {});
});

const btnPlay   = document.getElementById('btn-play');
const iconPlay  = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
btnPlay.addEventListener('click', () => {
  if (video.paused) video.play().then(() => unmuteGradual()).catch(() => {});
  else video.pause();
});
video.addEventListener('play',    () => { iconPlay.style.display='none'; iconPause.style.display=''; });
video.addEventListener('pause',   () => { iconPlay.style.display=''; iconPause.style.display='none'; });
video.addEventListener('waiting', () => spinner.classList.remove('hidden'));
video.addEventListener('playing', () => { spinner.classList.add('hidden'); errMsg.style.display='none'; });

const seekbar   = document.getElementById('seekbar');
const seekBar   = document.getElementById('seekbar-bar');
const seekBuf   = document.getElementById('seekbar-buf');
const seekThumb = document.getElementById('seekbar-thumb');
video.addEventListener('timeupdate', () => {
  if (!isFinite(video.duration) || !video.duration) return;
  const p = video.currentTime / video.duration * 100;
  seekBar.style.width  = p + '%';
  seekThumb.style.left = p + '%';
});
video.addEventListener('progress', () => {
  if (video.buffered.length && isFinite(video.duration))
    seekBuf.style.width = (video.buffered.end(video.buffered.length-1) / video.duration * 100) + '%';
});
let seeking = false;
const doSeek = e => {
  if (!isFinite(video.duration)) return;
  const r = seekbar.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * video.duration;
};
seekbar.addEventListener('mousedown', e => { seeking=true; doSeek(e); });
document.addEventListener('mousemove', e => { if(seeking) doSeek(e); });
document.addEventListener('mouseup',   () => { seeking=false; });
seekbar.addEventListener('touchstart', e => { e.preventDefault(); doSeek(e.touches[0]); });
seekbar.addEventListener('touchmove',  e => { e.preventDefault(); doSeek(e.touches[0]); });

document.getElementById('btn-rew').addEventListener('click', () => {
  if (isFinite(video.duration)) video.currentTime = Math.max(0, video.currentTime - 10);
});
document.getElementById('btn-fwd').addEventListener('click', () => {
  if (isFinite(video.duration)) video.currentTime = Math.min(video.duration, video.currentTime + 10);
});

const volRange = document.getElementById('vol-range');
const iconVol  = document.getElementById('icon-vol');
const iconMute = document.getElementById('icon-mute');
document.getElementById('btn-mute').addEventListener('click', () => {
  video.muted = !video.muted;
  iconVol.style.display  = video.muted ? 'none' : '';
  iconMute.style.display = video.muted ? ''     : 'none';
});
volRange.addEventListener('input', () => { video.volume = +volRange.value; });

const btnFs    = document.getElementById('btn-fs');
const iconFsOn = document.getElementById('icon-fs-on');
const iconFsOff= document.getElementById('icon-fs-off');
btnFs.addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement)
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  else
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
});
['fullscreenchange','webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    iconFsOn.style.display  = fs ? 'none' : '';
    iconFsOff.style.display = fs ? ''     : 'none';
  })
);

const btnPip = document.getElementById('btn-pip');
if (document.pictureInPictureEnabled) {
  btnPip.classList.remove('btn-hidden');
  btnPip.addEventListener('click', async () => {
    try { document.pictureInPictureElement ? await document.exitPictureInPicture() : await video.requestPictureInPicture(); } catch(_) {}
  });
}

const btnAP = document.getElementById('btn-airplay');
if (window.WebKitPlaybackTargetAvailabilityEvent) {
  video.addEventListener('webkitplaybacktargetavailabilitychanged', e => {
    btnAP.classList.toggle('btn-hidden', e.availability !== 'available');
  });
  btnAP.addEventListener('click', () => video.webkitShowPlaybackTargetPicker());
  video.addEventListener('webkitcurrentplaybacktargetiswirelesschanged', () => {
    btnAP.style.color = video.webkitCurrentPlaybackTargetIsWireless ? 'var(--green)' : '';
  });
}

const btnCast     = document.getElementById('btn-cast');
const castOverlay = document.getElementById('cast-overlay');
const castDevName = document.getElementById('cast-device-name');
function initCast() {
  try {
    const ctx = cast.framework.CastContext.getInstance();
    ctx.setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
    });
    btnCast.classList.remove('btn-hidden');
    ctx.addEventListener(cast.framework.CastContextEventType.CAST_STATE_CHANGED, e => {
      const CS = cast.framework.CastState;
      if (e.castState === CS.CONNECTED) {
        btnCast.classList.add('cast-active');
        const sess = ctx.getCurrentSession();
        castDevName.textContent = sess?.getCastDevice().friendlyName ?? 'TV';
        castOverlay.classList.add('active');
        loadMediaOnCast(ctx);
      } else {
        btnCast.classList.remove('cast-active');
        castOverlay.classList.remove('active');
        if (e.castState === CS.NOT_CONNECTED) video.play().catch(() => {});
      }
    });
    btnCast.addEventListener('click', async () => {
      const CS = cast.framework.CastState;
      const state = ctx.getCastState();
      if (state === CS.NOT_CONNECTED || state === CS.NO_DEVICES_AVAILABLE) {
        try { await ctx.requestSession(); } catch(_) {}
      } else { ctx.endCurrentSession(true); }
    });
  } catch(e) { console.warn('Cast:', e); }
}
function loadMediaOnCast(ctx) {
  try {
    const sess = ctx.getCurrentSession();
    if (!sess) return;
    const mi = new chrome.cast.media.MediaInfo(SRC, 'application/x-mpegURL');
    mi.streamType = chrome.cast.media.StreamType.LIVE;
    mi.metadata   = new chrome.cast.media.TvShowMediaMetadata();
    mi.metadata.title = TITLE;
    sess.loadMedia(new chrome.cast.media.LoadRequest(mi))
        .then(() => video.pause(), err => showToast('Cast error: ' + err));
  } catch(e) {}
}

let lastTap = 0;
video.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300 && isFinite(video.duration)) {
    e.preventDefault();
    video.currentTime += e.changedTouches[0].clientX < innerWidth/2 ? -10 : 10;
    video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime));
  }
  lastTap = now;
});

let hideT;
function showUI() {
  topbar.classList.remove('hide');
  controls.classList.remove('hide');
  qualBadge.classList.remove('hide');
  clearTimeout(hideT);
  if (!video.paused)
    hideT = setTimeout(() => {
      topbar.classList.add('hide');
      controls.classList.add('hide');
      qualBadge.classList.add('hide');
    }, 3500);
}
video.addEventListener('click', showUI);
document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI, { passive:true });
video.addEventListener('pause', showUI);
video.addEventListener('play', () => {
  hideT = setTimeout(() => {
    topbar.classList.add('hide');
    controls.classList.add('hide');
    qualBadge.classList.add('hide');
  }, 3500);
});
showUI();
</script>

<script>
/* Lógica de compartir y popup Telegram (parte 7) */
const shareModal = document.getElementById('share-modal');
document.getElementById('btn-share').addEventListener('click', () => { shareModal.classList.add('open'); showUI(); });
document.getElementById('share-close').addEventListener('click', () => shareModal.classList.remove('open'));
shareModal.addEventListener('click', e => { if (e.target === shareModal) shareModal.classList.remove('open'); });
document.querySelectorAll('.share-copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.target);
    navigator.clipboard.writeText(inp.value).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    }).catch(() => { try { inp.select(); document.execCommand('copy'); } catch(_) {} });
  });
});
document.getElementById('intro').addEventListener('animationend', function() { this.remove(); }, { once:true });

(function(){
  const pop = document.getElementById('tg-popup');
  const btn = document.getElementById('tg-close');
  if (!pop || !btn) return;
  function cerrarPopup(e) {
    e.stopImmediatePropagation();
    e.preventDefault();
    pop.style.animation = 'tgSlideOut .3s ease forwards';
    setTimeout(() => { pop.remove(); }, 320);
  }
  btn.addEventListener('click', cerrarPopup, true);
  btn.addEventListener('touchend', cerrarPopup, true);
  btn.addEventListener('touchstart', e => { e.stopImmediatePropagation(); }, true);
})();
</script>
