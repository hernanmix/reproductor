<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HSportsHD Player</title>
  <script src="https://cdn.jsdelivr.net/npm/jwplayer@latest"></script>
  <style>
    #player { width: 100%; height: 100vh; background:#000; }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
function getQueryParameter(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    document.addEventListener("DOMContentLoaded", function () {
      // Tomamos todos los parámetros de la URL
      const params = new URLSearchParams(window.location.search);

      // Verificamos que exista "canal"
      if (!params.has("canal")) {
        console.error("Falta el parámetro ?canal=");
        return;
      }

      // Construimos la URL final con TODOS los parámetros
      const proxyBase = "https://hsportsec.42web.io/proxy.php?canal=";
      const finalUrl = proxyBase + "?" + params.toString();

      const playerInstance = jwplayer("player").setup({
        playlist: [{
          sources: [{
            file: finalUrl,
            type: "hls"   // 👈 importante: HLS para .m3u8
          }]
        }],
        autostart: true,
        width: "100%",
        height: "100%",
        stretching: "uniform",
        skin: { name: "cyan" },
        logo: {
          file: "https://hernanmix.github.io/play.github.io/hsportshd.jpg", // URL del logo
          position: "top-right",   // esquina superior derecha
          margin: 20,              // separación del borde
          link: "https://whatsapp.com/channel/0029VbAtpgq4IBh5G4dGwZ1T" // enlace al hacer clic
        }
      });

      // Al entrar en fullscreen → forzar fill (sin bordes negros)
      playerInstance.on("fullscreen", function(e) {
        if (e.fullscreen) {
          playerInstance.setConfig({ stretching: "exactfit" });
        } else {
          playerInstance.setConfig({ stretching: "uniform" });
        }
      });
    });
  </script>

    
    
</body>
</html>
