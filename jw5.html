<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui">
  <meta name="referrer" content="no-referrer">
  <style>
    html, body {width:100%;height:100%;margin:0;overflow:hidden;background:#000;}
    body {display:flex;}
    #mse {flex:auto;}
  </style>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xgplayer@3.0.12/dist/index.min.css">
  <script>
    window.addEventListener('resize',function(){
      document.getElementById('mse').style.height=window.innerHeight+'px';
    });
  </script>
</head>
<body>
<div id="mse"></div>

<!-- Librerías -->
<script src="//cdn.jsdelivr.net/npm/xgplayer@3.0.13/dist/index.min.js" charset="utf-8"></script>
<script src="//cdn.jsdelivr.net/npm/xgplayer-hls.js@3.0.13/dist/index.min.js" charset="utf-8"></script>
<script src="//cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>

<script>
  // Configuración P2P
  var p2pConfig = {
    swFile: './sw.js',
    live: true // modo live
  };

  // Obtener parámetro ?stream=
  const params = new URLSearchParams(window.location.search);
  const stream = params.get("stream");

  if (!stream) {
    console.error("Falta el parámetro ?stream=");
  } else {
    const finalUrl = "https://canchatv.online/tvtvhd/proxy.php?stream=" + stream;

    P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
      var player = new window.Player({
        id: 'mse',
        isLive: true,
        url: finalUrl,
        autoplay: true,
        playsinline: true,
        height: window.innerHeight,
        width: window.innerWidth,
        plugins: P2pEngineHls.isMSESupported() ? [window.HlsJsPlugin] : [],
        hlsJsPlugin: {
          hlsOpts: {
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            liveSyncDuration: 10,
            liveMaxLatencyDuration: 60
          }
        }
      });

      const events = window.Player.Events;
      [events.READY, events.URL_CHANGE].forEach(event => {
        player.on(event, () => {
          if (P2pEngineHls.isMSESupported()) {
            p2pConfig.hlsjsInstance = player.getPlugin("HlsJsPlugin").hls;
          }
          new P2pEngineHls(p2pConfig);
        });
      });
    });
  }
</script>
</body>
</html>
