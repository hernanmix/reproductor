<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simultáneo HD</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0a0a1a; /* 🔹 negro azulado */
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      padding: 10px;
      background: #000814;
    }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr; /* 🔹 2 columnas */
      grid-template-rows: 1fr 1fr;    /* 🔹 2 filas */
      gap: 4px;
      padding: 4px;
    }
    .cell {
      position: relative;
      background: #000;
      display: flex;
      flex-direction: column;
    }
    .label {
      text-align: center;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      padding: 4px;
      background: rgba(0,0,0,0.6);
    }
    video {
      flex: 1;
      width: 100%;
      height: 100%;
      object-fit: fill; /* 🔹 ocupa todo el espacio sin márgenes negros */
      background: #000;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <header>Simultáneo HD</header>
  <div class="grid" id="grid"></div>

  <script>
    async function initMultiPlayer() {
      // 🔹 Cargar JSON de canales
      const response = await fetch("https://hernanmix.github.io/reproductor/channels2.json");
      const channels = await response.json();

      // 🔹 Obtener parámetro ?stream=...
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("stream");

      let selectedChannels = [];

      if (mode === "simultaneo") {
        // 🔹 Define los canales simultáneos con sus nombres
        selectedChannels = [
          {name: "ESPN", url: channels["espn"]},
          {name: "ESPN2", url: channels["espn2"]},
          {name: "FOX1AR", url: channels["fox1ar"]},
          {name: "FOX2AR", url: channels["fox2ar"]}
        ];
      } else {
        // 🔹 Reproduce solo un canal normal
        if (channels[mode]) {
          selectedChannels = [{name: mode.toUpperCase(), url: channels[mode]}];
        }
      }

      const grid = document.getElementById("grid");

      selectedChannels.forEach(ch => {
        if (!ch.url) return;
        const cell = document.createElement("div");
        cell.className = "cell";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = ch.name;

        const video = document.createElement("video");
        video.controls = true;
        video.autoplay = true;
        video.playsInline = true;

        cell.appendChild(label);
        cell.appendChild(video);
        grid.appendChild(cell);

        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(ch.url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = ch.url;
          video.addEventListener("loadedmetadata", () => video.play());
        }
      });
    }

    initMultiPlayer();
  </script>
</body>
</html>
