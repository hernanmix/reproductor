<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adulto - Video Player</title>
  <style>
    body {
      margin: 0;
      background: #0a1a0a; /* verde negruzco */
      font-family: Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      padding: 12px;
      color: yellow; /* texto amarillo */
    }
    .buttons {
      margin: 20px;
    }
    .buttons button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 16px;
      background: #000814;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .player-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .label {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      padding: 6px;
      color: #fff;
    }
    video {
      width: 80%;
      max-width: 800px;
      height: 450px;
      object-fit: cover; /* 🔹 sin márgenes negros */
      background: #000;
    }
    .close-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: red;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <header>Adulto - Simultáneo HD</header>

  <div class="buttons" id="buttons"></div>

  <!-- Overlay flotante -->
  <div class="player-overlay" id="overlay">
    <div class="label" id="videoLabel"></div>
    <video id="video" controls autoplay playsinline></video>
    <button class="close-btn" id="closeBtn">Cerrar</button>
  </div>

  <script>
    async function loadVideos() {
      try {
        const res = await fetch("https://hernanmix.github.io/reproductor/videox.json"); // 🔹 tu JSON externo
        const videos = await res.json();

        const buttonsDiv = document.getElementById("buttons");
        const overlay = document.getElementById("overlay");
        const videoEl = document.getElementById("video");
        const labelEl = document.getElementById("videoLabel");
        const closeBtn = document.getElementById("closeBtn");

        videos.forEach(v => {
          const btn = document.createElement("button");
          btn.innerText = v.title;
          btn.addEventListener("click", () => playVideo(v));
          buttonsDiv.appendChild(btn);
        });

        function playVideo(v) {
          labelEl.innerText = v.title;
          overlay.style.display = "flex";
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(v.url);
            hls.attachMedia(videoEl);
            hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play());
          } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
            videoEl.src = v.url;
            videoEl.addEventListener("loadedmetadata", () => videoEl.play());
          }
        }

        closeBtn.addEventListener("click", () => {
          overlay.style.display = "none";
          videoEl.pause();
          videoEl.src = "";
        });
      } catch(e) {
        console.error("Error cargando JSON", e);
      }
    }

    loadVideos();
  </script>
</body>
</html>
