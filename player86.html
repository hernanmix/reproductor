<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor Fluido</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background-color: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  .player-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .exit-button {
    position: fixed;
    top: 15px; left: 15px;
    width: 40px; height: 40px;
    background-color: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: none; /* oculto por defecto */
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 9999;
    transition: background-color 0.3s;
  }
  .exit-button:hover { background-color: rgba(0,0,0,0.6); }
  .exit-button svg { width: 20px; height: 20px; fill: #fff; }
</style>
</head>
<body>

<div class="player-container">
  <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<!-- Botón de salida -->
<div class="exit-button" id="exitBtn" onclick="exitFs()">
  <svg viewBox="0 0 24 24">
    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
  </svg>
</div>

<script>
  // ✅ Obtener canal desde la URL (?ch=1 ... ?ch=200)
  function getChannelParam() {
    const params = new URLSearchParams(window.location.search);
    let ch = params.get("ch");
    if (!ch) { ch = "1"; } // valor por defecto
    return ch;
  }

  const iframe = document.getElementById('videoPlayer');
  const channel = getChannelParam();

  // ✅ Construir URL final con inapp=1
  iframe.src = `https://live-stream-scraper--hsportshd.replit.app/?ch=${channel}&inapp=1`;

  // ✅ Detectar si es WebView (AppCreator24 usa WebView interno)
  function isInAppCreator24() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroidWebView = /\bwv\b/.test(ua) || (ua.includes("Version/") && ua.includes("Chrome/"));
    return isAndroidWebView;
  }

  // ✅ Mostrar botón ⟨ solo en AppCreator24
  if (isInAppCreator24()) {
    document.getElementById("exitBtn").style.display = "flex";
  }

  // ✅ Botón de salida
  function exitFs() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    }
    window.location.href = "go:exitFs"; 
  }
</script>

</body>
</html>
