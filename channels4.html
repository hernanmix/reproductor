<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HSPORTSEC | Cinematic Player</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#6ad6ff",
                        "background": "#020d18",
                        "surface": "#020d18",
                        "on-surface": "#e8eef7",
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; }
        #hls-video:fullscreen { object-fit: fill !important; width: 100vw !important; height: 100vh !important; }
        video { object-fit: fill; }
        .glass-panel { background: rgba(30, 39, 47, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        body { min-height: 100dvh; margin: 0; padding: 0; background-color: #020d18; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden select-none">
<div class="relative w-screen h-screen group overflow-hidden bg-black" id="player-shell">
    <video autoplay class="w-full h-full cursor-pointer" id="hls-video" playsinline></video>
    <div class="absolute inset-0 z-10 flex flex-col" id="controls-overlay">
        <header class="flex justify-between items-center px-6 py-6 w-full z-50 bg-gradient-to-b from-black/70 to-transparent absolute top-0 left-0">
            <div class="flex items-center gap-4">
                <button onclick="exitFs()" class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
                    <span class="material-symbols-outlined text-white text-3xl">arrow_back</span>
                </button>
                <div class="flex flex-col">
                    <h1 class="font-headline font-bold text-lg tracking-tight text-white leading-tight" id="stream-title">Live Stream</h1>
                    <span class="text-xs text-white/60 font-label uppercase tracking-widest">HSPORTSEC TV</span>
                </div>
            </div>
        </header>
        <main class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="flex items-center gap-12 pointer-events-auto">
                <button class="text-white hover:text-primary transition-all active:scale-90" id="rewind-btn"><span class="material-symbols-outlined text-5xl">replay_10</span></button>
                <button class="w-20 h-20 glass-panel border border-white/10 rounded-full flex items-center justify-center text-white" id="play-pause-btn"><span class="material-symbols-outlined text-6xl" id="play-icon">pause</span></button>
                <button class="text-white hover:text-primary transition-all active:scale-90" id="forward-btn"><span class="material-symbols-outlined text-5xl">forward_10</span></button>
            </div>
        </main>
        <footer class="w-full bg-gradient-to-t from-black/80 via-black/40 to-transparent px-6 pb-10 pt-20 mt-auto">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <button class="text-white hover:text-primary" id="volume-toggle"><span class="material-symbols-outlined" id="volume-icon">volume_up</span></button>
                </div>
                <button class="text-white hover:text-primary" id="fullscreen-btn"><span class="material-symbols-outlined" id="fs-icon">fullscreen</span></button>
            </div>
        </footer>
    </div>
    <div class="fixed top-4 right-6 z-[60] bg-[#e50914] px-4 py-1.5 rounded-full shadow-lg pointer-events-none">
        <span class="font-headline font-black text-white text-sm uppercase tracking-widest">HSPORTSEC</span>
    </div>
</div>

<script>
    const video = document.getElementById('hls-video');
    const playIcon = document.getElementById('play-icon');
    const streamTitle = document.getElementById('stream-title');

    function exitFs() {
        if (window.exitFs) {
            window.exitFs();
        } else {
            console.log("exitFs function called - returning to APK home");
            // Fallback for browser testing
            window.history.back();
        }
    }

    async function initPlayer() {
        const urlParams = new URLSearchParams(window.location.search);
        const stream = urlParams.get('stream') || 'telemundo';
        const hlsUrl = `https://canchatv.online/la14hd/proxy.php?stream=${stream}`;
        streamTitle.textContent = stream.toUpperCase();
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Network error, retrying...");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("Media error, recovering...");
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            initPlayer();
                            break;
                    }
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = hlsUrl;
        }
    }

    document.getElementById('play-pause-btn').onclick = () => {
        if (video.paused) video.play(); else video.pause();
        playIcon.textContent = video.paused ? 'play_arrow' : 'pause';
    };

    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) document.getElementById('player-shell').requestFullscreen();
        else document.exitFullscreen();
    };

    initPlayer();
</script>
</body>
</html>
