<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reproductor CHV Deportes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 🔹 Ajuste para que el iframe ocupe toda la pantalla */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- 🔹 Iframe embebido en pantalla completa -->
  <iframe 
    src="https://rudo.video/live/chvdeportes" 
    title="CHV Deportes"
    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
</body>
</html>
