<!DOCTYPE html>
<html>
<head>
    <title>Reproductor de video HLS</title>
    <style>
        body {
            margin: 0;
        }

        #videoPlayer {
            width: 100%;
            height: auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <video id="videoPlayer" controls></video>
    <script>
        var video = document.getElementById('videoPlayer');
        var videoUrl = 'https://prod-fastly-sa-east-1.video.pscp.tv/Transcoding/v1/hls/Z4qYbc4ouASK_Oy8aHqPzlGK6nuu-8SnxV0XFknabX_POiehK89zVuiD3hew5rih-dBUJJFk91vOrlp8n-e4KA/non_transcode/sa-east-1/periscope-replay-direct-prod-sa-east-1-public/master_dynamic_delta.m3u8?type=live?web=true';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
