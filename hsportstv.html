<circle class="text-outline-variant/20" cx="40" cy="40" fill="transparent" r="36" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="40" cy="40" fill="transparent" id="timer-progress" r="36" stroke="currentColor" stroke-dasharray="226.2" stroke-dashoffset="0" stroke-width="4" style="transition: stroke-dashoffset 1s linear;"></circle>
</svg>
<span class="absolute text-primary font-black text-2x8" id="countdown-text">15</span>

<script>
        function changeSource(url, element) {
            // Update iframe
            const iframe = document.getElementById('content-frame');
            if (iframe.src !== url) {
                iframe.src = url;
            }
            
            // Update Nav Styles
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                item.className = "nav-item flex flex-col items-center justify-center text-[#8d90a2] py-2 px-6 hover:text-white transition-all";
            });
            
            element.className = "nav-item flex flex-col items-center justify-center bg-[#2e4287] text-[#b0c6ff] rounded-full py-2 px-6 scale-110 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] bloom-effect";
        }

        let countdownInterval;
        function showAdsModal() {
            const modal = document.getElementById('ads-modal');
            const adsIframe = document.getElementById('ads-iframe');
            const countdownText = document.getElementById('countdown-text');
            const timerProgress = document.getElementById('timer-progress');
            
            modal.classList.remove('hidden');
            adsIframe.src = "https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db";
            
            let count = 15;
            const total = 15;
            countdownText.innerText = count;
            
            // Initial offset
            const circumference = 2 * Math.PI * 36;
            timerProgress.style.strokeDashoffset = 0;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                count--;
                countdownText.innerText = count;
                
                // Update progress ring
                const offset = circumference - (count / total) * circumference;
                timerProgress.style.strokeDashoffset = offset;

                if (count <= 0) {
                    clearInterval(countdownInterval);
                    closeAdsModal();
                }
            }, 1000);
        }

        function closeAdsModal() {
            const modal = document.getElementById('ads-modal');
            const adsIframe = document.getElementById('ads-iframe');
            modal.classList.add('hidden');
            adsIframe.src = "";
        }
    </script>
