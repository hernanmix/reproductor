<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor Fullscreen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
    #playerContainer {
      position: fixed; /* siempre fijo en pantalla */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      z-index: 999;
    }
    #playerContainer iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div id="playerContainer">
    <iframe id="liveFrame"
      src=""
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    (function(){
      // URL base de tu proxy/reproductor
      const baseURL = "https://m-3-u-player--hermixervdj94.replit.app/?channel=";

      // Obtener parámetro ?channel=xxx de la URL
      const params = new URLSearchParams(window.location.search);
      const channel = params.get("channel") || "disney1"; // valor por defecto

      // Construir URL final
      const streamURL = `${baseURL}&channel=${channel}`;

      // Asignar al iframe
      document.getElementById("liveFrame").src = streamURL;
    })();
  </script>
</body>
</html>
