<div style="text-align:center; margin:20px;">
  <h2 style="color:white;">Generador de Eventos JSON Limpio</h2>
  <textarea id="entradaEventos" rows="20" cols="80" placeholder="Pega aquí tus ligas y partidos..." style="width:90%;"></textarea><br><br>
  
  <!-- Selector de fecha -->
  <label for="fechaSelector" style="color:white;">Selecciona la fecha de inicio:</label><br>
  <input type="date" id="fechaSelector" style="padding:10px 20px; font-size:16px; margin-top:10px;"><br><br>

  <button onclick="generarJSON()" style="padding:10px 20px; font-size:16px;">Generar JSON</button>
  <button onclick="copiarJSON()" style="padding:10px 20px; font-size:16px; margin-left:10px;">Copiar JSON</button>
  
  <h3 style="color:white;">Resultado:</h3>
  <textarea id="salidaJSON" rows="20" cols="80" style="width:90%;"></textarea>
</div>

<script>
function generarEventosJSON(inputTexto, fechaInicio = null) {
  const lineas = inputTexto.trim().split("\n").map(l => l.trim()).filter(l => l !== "");
  let eventos = [];
  let liga = "";
  let i = 0;

  // Si no se pasa la fecha de inicio, tomar la fecha actual
  let fechaActual = fechaInicio ? new Date(fechaInicio) : new Date();

  while (i < lineas.length) {
    const linea = lineas[i];

    // Detectar liga
    if (!/^\d{1,2}:\d{2}$/.test(linea) && linea.includes("-")) {
      liga = linea;
      i++;
      continue;
    }

    // Detectar hora
    if (/^\d{1,2}:\d{2}$/.test(linea)) {
      const horaInicio = linea;
      const equipos = lineas[i + 1] || "Partido desconocido";

      const fechaISO = fechaActual.toISOString().split("T")[0];
      const horaFin = calcularHoraFin(horaInicio, 120, fechaActual); // Duración 120 min exacta

      eventos.push({
        "title": equipos,
        "league": `2026 • ${liga}`,
        "start": `${fechaISO}T${formatHora(horaInicio)}:00`,
        "end": `${fechaISO}T${horaFin}:00`,
        "image": "https://hernanmix.github.io/reproductor/imagen.png",
        "url": "##"
      });

      i += 2; // saltamos hora y equipos
    } else {
      i++;
    }
  }

  // Ordenar los eventos por fecha y hora
  eventos.sort((a, b) => new Date(a.start) - new Date(b.start));

  return eventos;
}

// Asegura que siempre HH:MM tenga formato 2 dígitos
function formatHora(horaStr) {
  let [h, m] = horaStr.split(":").map(Number);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function calcularHoraFin(horaInicio, duracionMin, fecha) {
  const [h, m] = horaInicio.split(":").map(Number);
  const inicio = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate(), h, m);
  const fin = new Date(inicio.getTime() + duracionMin * 60000);
  const hh = String(fin.getHours()).padStart(2,"0");
  const mm = String(fin.getMinutes()).padStart(2,"0");
  return `${hh}:${mm}`;
}

function generarJSON() {
  const entrada = document.getElementById("entradaEventos").value;

  // Obtener la fecha seleccionada del calendario
  const fechaSeleccionada = document.getElementById("fechaSelector").value;
  
  // Si no se seleccionó fecha, se usa la fecha actual
  const eventos = generarEventosJSON(entrada, fechaSeleccionada || null);
  
  document.getElementById("salidaJSON").value = JSON.stringify(eventos, null, 2);
}

function copiarJSON() {
  const salida = document.getElementById("salidaJSON");
  salida.select();
  document.execCommand("copy");
  alert("JSON copiado al portapapeles");
}
</script>
