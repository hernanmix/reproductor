<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App HSPORTSEC</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #000022;
    font-family: 'Be Vietnam Pro', sans-serif;
    display: flex;
    flex-direction: column;
  }

  .content {
    flex: 1;
    position: relative;
    height: calc(100vh - 40px);
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    transition: transform 0.35s ease, opacity 0.35s ease;
  }

  /* 🔥 scroll vertical animado */
  .slide-out {
    transform: translateY(-90px);
    opacity: 0;
  }

  .slide-in {
    transform: translateY(0);
    opacity: 1;
  }

  .ad-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%; max-width: 600px;
    height: 80%; max-height: 400px;
    background: #111;
    border: 2px solid #00f;
    display: none;
    flex-direction: column;
    z-index: 1000;
  }

  .countdown {
    position: absolute;
    top: 5px; right: 10px;
    font-size: 20px;
    color: #00f;
    font-weight: bold;
  }

  .bottom-menu {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    height: 60px;
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 50;
  }

  .menu-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
  }

  .menu-btn:hover {
    color: white;
    transform: scale(1.05);
  }

  .menu-btn .material-symbols-outlined {
    font-size: 26px;
    margin-bottom: 4px;
  }

  .active {
    color: white;
    border-top: 2px solid #0072FF;
  }

  @media (min-width: 1200px) {
    .bottom-menu {
      height: 85px;
    }

    .menu-btn .material-symbols-outlined {
      font-size: 34px;
    }

    .menu-btn {
      font-size: 14px;
    }
  }
</style>
</head>

<body>

<!-- Header -->
<header class="w-full fixed top-0 z-50 bg-[#0b1326]/90 backdrop-blur-lg border-b border-[#2d3449]/50 py-4 flex justify-center items-center gap-4">
  <!-- Contenedor del texto y el icono juntos -->
  <div class="flex items-center gap-3">
    <span class="text-2xl md:text-4xl font-black text-[#00e55b] italic tracking-[0.2em]">HSP⚽RTSEC</span>
    <a class="flex items-center justify-center w-10 h-10 md:w-14 md:h-14 rounded-full bg-[#26A5E4] hover:scale-110 transition-transform shadow-xl shadow-[#26A5E4]/30" href="https://t.me/hsportsec" target="_blank">
      <span class="material-symbols-outlined text-white text-2xl">send</span>
    </a>
  </div>
</header>

  
<div class="content">
  <iframe id="mainFrame" src="https://hernanmix.github.io/reproductor/ap-index.html"></iframe>

  <div class="ad-container" id="adContainer">
    <div class="countdown" id="adCountdown">15</div>
    <iframe id="adFrame"></iframe>
  </div>
</div>

<!-- MENÚ -->
<nav class="bottom-menu">

  <div class="menu-btn active" onclick="navigate('https://hernanmix.github.io/reproductor/ap-index.html')">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">home</span>
    Inicio
  </div>

  <div class="menu-btn" onclick="navigate('https://hernanmix.github.io/reproductor/ap-tv.html')">
    <span class="material-symbols-outlined">live_tv</span>
    TV
  </div>
   

  <div class="menu-btn" onclick="navigate('go:verweb')">
    <span class="material-symbols-outlined">volunteer_activism</span>
    Donar
  </div>


  <div class="menu-btn" onclick="navigate('go:agenda1')">
    <span class="material-symbols-outlined">sports_soccer</span>
    Agenda
  </div>


  

  
  <div class="menu-btn" onclick="showAd()">
    <span class="material-symbols-outlined">ads_click</span>
    Ads
  </div>

  <a href="http://action_exit" class="menu-btn">
    <span class="material-symbols-outlined">logout</span>
    Salir
  </a>

</nav>

<script>
  const iframe = document.getElementById('mainFrame');
  const adContainer = document.getElementById('adContainer');
  const adFrame = document.getElementById('adFrame');
  const adCountdownEl = document.getElementById('adCountdown');

  function navigate(url) {
    const frame = document.getElementById('mainFrame');

    // efecto scroll vertical
    frame.classList.add('slide-out');

    setTimeout(() => {
      frame.src = url;

      frame.classList.remove('slide-out');
      frame.classList.add('slide-in');

      setTimeout(() => {
        frame.classList.remove('slide-in');
      }, 400);

    }, 300);
  }

  function showAd() {
    adContainer.style.display = 'flex';
    adFrame.src = 'https://annoyingnightmareedit.com/sx8hwavut?key=12d54e488207e905a50e1b60079637db';

    let counter = 15;
    adCountdownEl.textContent = counter;

    const timer = setInterval(() => {
      counter--;
      adCountdownEl.textContent = counter;

      if (counter <= 0) {
        clearInterval(timer);
        adContainer.style.display = 'none';
        adFrame.src = '';
      }
    }, 1000);
  }
</script>
<script src="https://hernanmix.github.io/reproductor/script3.js"></script>
